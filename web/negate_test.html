<!DOCTYPE html>
<html>
<head>
<title>Negate DOF Test</title>
<style>
body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
pre { background: #0d0d1a; padding: 10px; border-radius: 4px; }
.pass { color: #4caf50; } .fail { color: #ff5252; }
</style>
</head>
<body>
<h1>Negate Spherical DOF Test</h1>
<p>Test if negating spherical joint DOFs makes PhysX WASM match Isaac Lab body positions.</p>
<pre id="log">Loading PhysX WASM...</pre>
<script type="module">
const log = document.getElementById('log');
function L(msg, cls) { const s = document.createElement('span'); s.className = cls||''; s.textContent = msg+'\n'; log.appendChild(s); }
function dist(a,b) { return Math.sqrt((a[0]-b[0])**2+(a[1]-b[1])**2+(a[2]-b[2])**2); }

const module = await import('https://cdn.jsdelivr.net/npm/physx-js-webidl@2.7.2/physx-js-webidl.mjs');
const PhysX = await module.default({ locateFile: () => 'https://cdn.jsdelivr.net/npm/physx-js-webidl@2.7.2/physx-js-webidl.wasm' });
log.textContent = '';
L('PhysX WASM loaded');

const tlf = PhysX.PxTopLevelFunctions.prototype;
const v = PhysX.PHYSICS_VERSION;
const f = tlf.CreateFoundation(v, new PhysX.PxDefaultAllocator(), new PhysX.PxDefaultErrorCallback());
const tol = new PhysX.PxTolerancesScale();
const physics = tlf.CreatePhysics(v, f, tol);
const sd = new PhysX.PxSceneDesc(tol);
sd.set_gravity(new PhysX.PxVec3(0,0,0));
sd.set_cpuDispatcher(tlf.DefaultCpuDispatcherCreate(0));
sd.set_filterShader(tlf.DefaultFilterShader());
sd.set_solverType(PhysX.PxSolverTypeEnum.eTGS);
const scene = physics.createScene(sd);

const ET = PhysX.PxArticulationAxisEnum.eTWIST;
const ES1 = PhysX.PxArticulationAxisEnum.eSWING1;
const ES2 = PhysX.PxArticulationAxisEnum.eSWING2;
const ESPH = PhysX.PxArticulationJointTypeEnum.eSPHERICAL;
const EREV = PhysX.PxArticulationJointTypeEnum.eREVOLUTE;
const EFIX = PhysX.PxArticulationJointTypeEnum.eFIX;
const ELIM = PhysX.PxArticulationMotionEnum.eLIMITED;
const ELCK = PhysX.PxArticulationMotionEnum.eLOCKED;
const sf = new PhysX.PxShapeFlags(PhysX.PxShapeFlagEnum.eSCENE_QUERY_SHAPE|PhysX.PxShapeFlagEnum.eSIMULATION_SHAPE);
const mat = physics.createMaterial(1,1,0);
const rbx = PhysX.PxRigidBodyExt.prototype;

// Isaac Lab frame 0 trace data
const rp = [-0.0310, 0.7890, 0.7972];
const rr = [0.0593, 0.1507, -0.7036, 0.6919]; // xyzw
// Hip DOFs: twist(X)=-0.14048, swing1(Y)=-0.34596, swing2(Z)=-0.81146
const hipT = -0.14048, hipS1 = -0.34596, hipS2 = -0.81146;
const kneeT = 1.01240;
// Knee localRot (wxyz)
const klr = [0.7071067811865476, 0, 0, 0.7071067811865475];

// Isaac Lab reference
const isaacThigh = [-0.11519, 0.78877, 0.80822];
const isaacShin = [-0.26758, 0.59711, 0.46508];
const isaacFoot = [-0.28437, 0.78464, 0.10101];

function buildAndTest(label, negateHip, negateKnee) {
    L('\n=== ' + label + ' ===');
    const a = physics.createArticulationReducedCoordinate();
    a.setSolverIterationCounts(4,0);

    const pelvis = a.createLink(null, new PhysX.PxTransform(new PhysX.PxVec3(0,0,0.903), new PhysX.PxQuat(0,0,0,1)));
    pelvis.attachShape(physics.createShape(new PhysX.PxSphereGeometry(0.09), mat, true, sf));
    rbx.setMassAndUpdateInertia(pelvis, 10);

    const thigh = a.createLink(pelvis, new PhysX.PxTransform(new PhysX.PxVec3(0,-0.084887,0.903), new PhysX.PxQuat(0,0,0,1)));
    thigh.attachShape(physics.createShape(new PhysX.PxCapsuleGeometry(0.055,0.2), mat, true, sf));
    rbx.setMassAndUpdateInertia(thigh, 5);
    const hj = thigh.getInboundJoint();
    hj.setJointType(ESPH);
    hj.setParentPose(new PhysX.PxTransform(new PhysX.PxVec3(0,-0.084887,0), new PhysX.PxQuat(0,0,0,1)));
    hj.setChildPose(new PhysX.PxTransform(new PhysX.PxVec3(0,0,0), new PhysX.PxQuat(0,0,0,1)));
    hj.setMotion(ET, ELIM); hj.setMotion(ES1, ELIM); hj.setMotion(ES2, ELIM);

    const shin = a.createLink(thigh, new PhysX.PxTransform(new PhysX.PxVec3(0,-0.084887,0.903-0.421546), new PhysX.PxQuat(0,0,0,1)));
    shin.attachShape(physics.createShape(new PhysX.PxCapsuleGeometry(0.05,0.2), mat, true, sf));
    rbx.setMassAndUpdateInertia(shin, 3);
    const kj = shin.getInboundJoint();
    kj.setJointType(EREV);
    kj.setParentPose(new PhysX.PxTransform(new PhysX.PxVec3(0,0,-0.421546), new PhysX.PxQuat(klr[1],klr[2],klr[3],klr[0])));
    kj.setChildPose(new PhysX.PxTransform(new PhysX.PxVec3(0,0,0), new PhysX.PxQuat(klr[1],klr[2],klr[3],klr[0])));
    kj.setMotion(ET, ELIM); kj.setMotion(ES1, ELCK); kj.setMotion(ES2, ELCK);

    const foot = a.createLink(shin, new PhysX.PxTransform(new PhysX.PxVec3(0,-0.084887,0.903-0.421546-0.40987), new PhysX.PxQuat(0,0,0,1)));
    foot.attachShape(physics.createShape(new PhysX.PxBoxGeometry(0.09,0.045,0.03), mat, true, sf));
    rbx.setMassAndUpdateInertia(foot, 1);
    const aj = foot.getInboundJoint();
    aj.setJointType(EFIX);
    aj.setParentPose(new PhysX.PxTransform(new PhysX.PxVec3(0,0,-0.40987), new PhysX.PxQuat(0,0,0,1)));
    aj.setChildPose(new PhysX.PxTransform(new PhysX.PxVec3(0,0,0), new PhysX.PxQuat(0,0,0,1)));

    scene.addArticulation(a);
    a.setRootGlobalPose(new PhysX.PxTransform(new PhysX.PxVec3(rp[0],rp[1],rp[2]), new PhysX.PxQuat(rr[0],rr[1],rr[2],rr[3])), true);

    const nh = negateHip ? -1 : 1;
    const nk = negateKnee ? -1 : 1;
    hj.setJointPosition(ET, nh * hipT);
    hj.setJointPosition(ES1, nh * hipS1);
    hj.setJointPosition(ES2, nh * hipS2);
    kj.setJointPosition(ET, nk * kneeT);

    const fl = new PhysX.PxArticulationCacheFlags(PhysX.PxArticulationCacheFlagEnum.eALL);
    const c = a.createCache(); a.copyInternalStateToCache(c, fl); a.applyCache(c, fl, true);

    const tp = thigh.getGlobalPose().get_p();
    const sp = shin.getGlobalPose().get_p();
    const fp = foot.getGlobalPose().get_p();
    const wt = [tp.get_x(),tp.get_y(),tp.get_z()];
    const ws = [sp.get_x(),sp.get_y(),sp.get_z()];
    const wf = [fp.get_x(),fp.get_y(),fp.get_z()];

    const te = dist(wt, isaacThigh);
    const se = dist(ws, isaacShin);
    const fe = dist(wf, isaacFoot);
    const me = Math.max(te, se, fe);
    const cls = me < 0.01 ? 'pass' : 'fail';
    L('  thigh err=' + te.toFixed(4) + '  shin err=' + se.toFixed(4) + '  foot err=' + fe.toFixed(4), cls);
    L('  foot web=[' + wf.map(v=>v.toFixed(4)).join(',') + '] isaac=[' + isaacFoot.map(v=>v.toFixed(4)).join(',') + ']', cls);
    L('  max_err=' + me.toFixed(4) + (me < 0.01 ? ' ✓ MATCH!' : ''), cls);

    scene.removeArticulation(a);
    return me;
}

// Test all combinations of negation
buildAndTest('Normal (no negate)', false, false);
buildAndTest('Negate hip only', true, false);
buildAndTest('Negate knee only', false, true);
buildAndTest('Negate both', true, true);

// Also test: negate hip, negate knee, and swap hip axis order
L('\n=== Axis swaps with negation ===');
function buildSwapped(label, tVal, s1Val, s2Val, kVal) {
    L('\n=== ' + label + ' ===');
    const a = physics.createArticulationReducedCoordinate();
    a.setSolverIterationCounts(4,0);
    const pelvis = a.createLink(null, new PhysX.PxTransform(new PhysX.PxVec3(0,0,0.903), new PhysX.PxQuat(0,0,0,1)));
    pelvis.attachShape(physics.createShape(new PhysX.PxSphereGeometry(0.09), mat, true, sf));
    rbx.setMassAndUpdateInertia(pelvis, 10);

    const thigh = a.createLink(pelvis, new PhysX.PxTransform(new PhysX.PxVec3(0,-0.084887,0.903), new PhysX.PxQuat(0,0,0,1)));
    thigh.attachShape(physics.createShape(new PhysX.PxCapsuleGeometry(0.055,0.2), mat, true, sf));
    rbx.setMassAndUpdateInertia(thigh, 5);
    const hj = thigh.getInboundJoint();
    hj.setJointType(ESPH);
    hj.setParentPose(new PhysX.PxTransform(new PhysX.PxVec3(0,-0.084887,0), new PhysX.PxQuat(0,0,0,1)));
    hj.setChildPose(new PhysX.PxTransform(new PhysX.PxVec3(0,0,0), new PhysX.PxQuat(0,0,0,1)));
    hj.setMotion(ET, ELIM); hj.setMotion(ES1, ELIM); hj.setMotion(ES2, ELIM);

    const shin = a.createLink(thigh, new PhysX.PxTransform(new PhysX.PxVec3(0,-0.084887,0.903-0.421546), new PhysX.PxQuat(0,0,0,1)));
    shin.attachShape(physics.createShape(new PhysX.PxCapsuleGeometry(0.05,0.2), mat, true, sf));
    rbx.setMassAndUpdateInertia(shin, 3);
    const kj = shin.getInboundJoint();
    kj.setJointType(EREV);
    kj.setParentPose(new PhysX.PxTransform(new PhysX.PxVec3(0,0,-0.421546), new PhysX.PxQuat(klr[1],klr[2],klr[3],klr[0])));
    kj.setChildPose(new PhysX.PxTransform(new PhysX.PxVec3(0,0,0), new PhysX.PxQuat(klr[1],klr[2],klr[3],klr[0])));
    kj.setMotion(ET, ELIM); kj.setMotion(ES1, ELCK); kj.setMotion(ES2, ELCK);

    const foot = a.createLink(shin, new PhysX.PxTransform(new PhysX.PxVec3(0,-0.084887,0.903-0.421546-0.40987), new PhysX.PxQuat(0,0,0,1)));
    foot.attachShape(physics.createShape(new PhysX.PxBoxGeometry(0.09,0.045,0.03), mat, true, sf));
    rbx.setMassAndUpdateInertia(foot, 1);
    const aj = foot.getInboundJoint();
    aj.setJointType(EFIX);
    aj.setParentPose(new PhysX.PxTransform(new PhysX.PxVec3(0,0,-0.40987), new PhysX.PxQuat(0,0,0,1)));
    aj.setChildPose(new PhysX.PxTransform(new PhysX.PxVec3(0,0,0), new PhysX.PxQuat(0,0,0,1)));

    scene.addArticulation(a);
    a.setRootGlobalPose(new PhysX.PxTransform(new PhysX.PxVec3(rp[0],rp[1],rp[2]), new PhysX.PxQuat(rr[0],rr[1],rr[2],rr[3])), true);
    hj.setJointPosition(ET, tVal);
    hj.setJointPosition(ES1, s1Val);
    hj.setJointPosition(ES2, s2Val);
    kj.setJointPosition(ET, kVal);

    const fl = new PhysX.PxArticulationCacheFlags(PhysX.PxArticulationCacheFlagEnum.eALL);
    const c = a.createCache(); a.copyInternalStateToCache(c, fl); a.applyCache(c, fl, true);

    const fp2 = foot.getGlobalPose().get_p();
    const wf = [fp2.get_x(),fp2.get_y(),fp2.get_z()];
    const sp2 = shin.getGlobalPose().get_p();
    const ws = [sp2.get_x(),sp2.get_y(),sp2.get_z()];
    const fe = dist(wf, isaacFoot);
    const se = dist(ws, isaacShin);
    const me = Math.max(fe, se);
    const cls = me < 0.01 ? 'pass' : 'fail';
    L('  shin err=' + se.toFixed(4) + '  foot err=' + fe.toFixed(4) + '  max=' + me.toFixed(4) + (me < 0.01 ? ' ✓' : ''), cls);
    scene.removeArticulation(a);
    return me;
}

// Try all sign/axis permutations for the hip spherical DOFs
// Original: T=hipT, S1=hipS1, S2=hipS2
// Negate + swap combos
const h = { T: hipT, S1: hipS1, S2: hipS2 };
const combos = [
    ['neg all', -h.T, -h.S1, -h.S2, kneeT],
    ['neg hip, neg knee', -h.T, -h.S1, -h.S2, -kneeT],
    ['swap S1/S2', h.T, h.S2, h.S1, kneeT],
    ['neg + swap S1/S2', -h.T, -h.S2, -h.S1, kneeT],
    ['neg T, swap S1/S2', -h.T, h.S2, h.S1, kneeT],
    ['neg S1/S2 only', h.T, -h.S1, -h.S2, kneeT],
    ['neg T only', -h.T, h.S1, h.S2, kneeT],
    // Try DOF values assigned to different axes
    ['T←S2, S1←T, S2←S1', h.S2, h.T, h.S1, kneeT],
    ['T←S1, S1←S2, S2←T', h.S1, h.S2, h.T, kneeT],
    ['neg: T←S2, S1←T, S2←S1', -h.S2, -h.T, -h.S1, kneeT],
    ['neg: T←S1, S1←S2, S2←T', -h.S1, -h.S2, -h.T, kneeT],
];

let best = Infinity, bestLabel = '';
for (const [label, t, s1, s2, k] of combos) {
    const e = buildSwapped(label, t, s1, s2, k);
    if (e < best) { best = e; bestLabel = label; }
}

L('\n=== BEST: ' + bestLabel + ' (err=' + best.toFixed(4) + ') ===', best < 0.01 ? 'pass' : 'fail');
L('\n=== DONE ===');
</script>
</body>
</html>
