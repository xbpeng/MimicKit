<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MimicKit - ASE Humanoid Sword &amp; Shield</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
canvas { display: block; }
#overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(26,26,46,0.95); z-index: 10;
    flex-direction: column; color: #e0e0ff;
}
#overlay h1 { font-size: 2em; margin-bottom: 0.5em; }
#overlay .status { font-size: 1.1em; opacity: 0.8; margin-top: 0.5em; }
#overlay .spinner {
    width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.15);
    border-top-color: #7c83ff; border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 1em;
}
@keyframes spin { to { transform: rotate(360deg); } }
#hud {
    position: absolute; top: 12px; left: 16px; color: #b0b0d0;
    font-size: 13px; line-height: 1.6; pointer-events: none; z-index: 5;
}
#hud .title { font-size: 15px; font-weight: 600; color: #d0d0ff; }
#controls {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    color: #b0b0d0; font-size: 12px; z-index: 5; text-align: center;
    background: rgba(26,26,46,0.7); padding: 8px 16px; border-radius: 8px;
}
#controls button {
    background: #3a3a5e; color: #d0d0ff; border: 1px solid #5a5a8e;
    padding: 6px 14px; border-radius: 4px; cursor: pointer; margin: 0 4px;
    font-size: 12px;
}
#controls button:hover { background: #4a4a7e; }
#debugPanel {
    position: absolute; top: 12px; right: 16px;
    background: rgba(20,20,40,0.85); color: #b0b0d0;
    padding: 12px 16px; border-radius: 8px; z-index: 5;
    font-size: 12px; width: 200px; line-height: 2;
    border: 1px solid rgba(100,100,160,0.3);
}
#debugPanel .panel-title {
    font-weight: 600; color: #d0d0ff; margin-bottom: 8px;
    font-size: 13px;
}
#debugPanel label { display: block; cursor: pointer; }
#debugPanel input[type="range"] { width: 100%; }
#debugPanel .separator {
    border-top: 1px solid rgba(100,100,160,0.3);
    margin: 8px 0;
}
</style>
</head>
<body>

<div id="overlay">
    <h1>MimicKit Web Demo</h1>
    <div class="spinner"></div>
    <div class="status" id="loadStatus">Initializing...</div>
</div>

<div id="hud">
    <div class="title">ASE Humanoid - Sword &amp; Shield</div>
    <div id="fpsDisplay">FPS: --</div>
    <div id="physInfo">PhysX WASM + ONNX Runtime</div>
</div>

<div id="controls">
    <button id="btnReset">Reset</button>
    <button id="btnNewLatent">New Skill (Random Latent)</button>
    <span style="margin-left: 12px; opacity: 0.5;">Orbit: drag | Zoom: scroll | Pan: right-drag</span>
</div>

<div id="debugPanel">
    <div class="panel-title" id="debugToggle" style="cursor: pointer; user-select: none;">Debug Controls <span id="debugArrow">&#9660;</span></div>
    <div id="debugContent">

    <label><input type="checkbox" id="chkDrives" checked> Active Drives (muscles)</label>
    <label><input type="checkbox" id="chkPolicy" checked> NN Policy</label>
    <label><input type="checkbox" id="chkSelfCollision"> Self-Collision</label>
    <label><input type="checkbox" id="chkGravity" checked> Gravity</label>
    <label><input type="checkbox" id="chkWSInference"> WS Inference (localhost:8765)</label>

    <div class="separator"></div>

    <div>Gravity</div>
    <input type="range" id="sliderGravity" min="-20" max="0" step="0.1" value="-9.81">
    <span id="gravityVal">-9.81</span>

    <div>Substeps</div>
    <input type="range" id="sliderSubsteps" min="1" max="16" step="1" value="1">
    <span id="substepsVal">1</span>

    <div class="separator"></div>

    <div id="debugInfo" style="font-size: 10px; line-height: 1.4; opacity: 0.7;">
        root_z: --<br>
        root_speed: --<br>
        max_dof_vel: --
    </div>

    </div><!-- debugContent -->
</div>

// No coordinate conversion needed - PhysX runs in Z-up matching MJCF/training convention.
// Only Three.js rendering converts Z-up to Y-up via a worldGroup rotation.

function quatFromTwoVec(from, to) {
    const [fx,fy,fz] = from, [tx,ty,tz] = to;
    const dot = fx*tx + fy*ty + fz*tz;
    if (dot > 0.999999) return [0,0,0,1];
    if (dot < -0.999999) {
        let ax = [0, -fz, fy];
        if (Math.abs(fx) > 0.9) ax = [fz, 0, -fx];
        const len = Math.sqrt(ax[0]*ax[0]+ax[1]*ax[1]+ax[2]*ax[2]);
        return [ax[0]/len, ax[1]/len, ax[2]/len, 0];
    }
    const cx = fy*tz - fz*ty, cy = fz*tx - fx*tz, cz = fx*ty - fy*tx;
    const w = 1 + dot;
    const len = Math.sqrt(cx*cx + cy*cy + cz*cz + w*w);
    return [cx/len, cy/len, cz/len, w/len];
}

function gaussianRandom() {
    let u = 0, v = 0;
    while (u === 0) u = Math.random();
    while (v === 0) v = Math.random();
    return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
}

// ---------------------------------------------------------------------------
// Load humanoid JSON
// ---------------------------------------------------------------------------
async function loadHumanoidData() {
    setStatus('Loading humanoid data...');
    const resp = await fetch('./humanoid_data.json?v=' + Date.now());
    humanoidData = await resp.json();
    console.log('Humanoid data loaded:', humanoidData.bodies.length, 'bodies');

    // FIX: Swap SWING1 ↔ SWING2 axis mapping for spherical joints.
    // PhysX WASM's spherical joint resolves DOFs with swing axes swapped
    // relative to the convention used by Isaac Lab / MimicKit's export.
    // This affects setJointPosition, getJointPosition, setDriveTarget, etc.
    for (const dof of humanoidData.dofInfo) {
        if (dof.physx_axis === 1) dof.physx_axis = 2;       // SWING1 → SWING2
        else if (dof.physx_axis === 2) dof.physx_axis = 1;  // SWING2 → SWING1
    }

    // Also fix the joint axisMap entries
    for (const jdata of humanoidData.joints) {
        if (jdata.jointType === 'spherical' && jdata.axisMap) {
            jdata.axisMap = jdata.axisMap.map(a => a === 1 ? 2 : a === 2 ? 1 : a);
        }
    }
}

// ---------------------------------------------------------------------------
// Init PhysX
// ---------------------------------------------------------------------------
async function initPhysX() {
    setStatus('Loading PhysX WASM...');

    const module = await import('https://cdn.jsdelivr.net/npm/physx-js-webidl@2.7.2/physx-js-webidl.mjs');
    PhysX = await module.default({
        locateFile: () => 'https://cdn.jsdelivr.net/npm/physx-js-webidl@2.7.2/physx-js-webidl.wasm'
    });
    console.log('PhysX WASM loaded');

    // Cache enums (static properties on enum classes)
    E_TWIST   = PhysX.PxArticulationAxisEnum.eTWIST;
    E_SWING1  = PhysX.PxArticulationAxisEnum.eSWING1;
    E_SWING2  = PhysX.PxArticulationAxisEnum.eSWING2;
    E_LIMITED = PhysX.PxArticulationMotionEnum.eLIMITED;
    E_LOCKED  = PhysX.PxArticulationMotionEnum.eLOCKED;
    E_SPHERICAL = PhysX.PxArticulationJointTypeEnum.eSPHERICAL;
    E_REVOLUTE  = PhysX.PxArticulationJointTypeEnum.eREVOLUTE;
    E_FIX       = PhysX.PxArticulationJointTypeEnum.eFIX;
    E_FORCE     = PhysX.PxArticulationDriveTypeEnum.eFORCE;
    E_CACHE_ALL = PhysX.PxArticulationCacheFlagEnum.eALL;
    SHAPE_FLAGS_VAL = PhysX.PxShapeFlagEnum.eSCENE_QUERY_SHAPE | PhysX.PxShapeFlagEnum.eSIMULATION_SHAPE;

    // Top-level functions accessed via prototype
    const tlf = PhysX.PxTopLevelFunctions.prototype;
    const version = PhysX.PHYSICS_VERSION;
    const allocator = new PhysX.PxDefaultAllocator();
    const errorCb = new PhysX.PxDefaultErrorCallback();
    foundation = tlf.CreateFoundation(version, allocator, errorCb);

    const tolerances = new PhysX.PxTolerancesScale();
    physics = tlf.CreatePhysics(version, foundation, tolerances);

    // Create scene
    const cpuDispatcher = tlf.DefaultCpuDispatcherCreate(0);
    const sceneDesc = new PhysX.PxSceneDesc(tolerances);
    sceneDesc.set_gravity(new PhysX.PxVec3(0, 0, -9.81));
    sceneDesc.set_cpuDispatcher(cpuDispatcher);
    sceneDesc.set_filterShader(tlf.DefaultFilterShader());
    sceneDesc.set_bounceThresholdVelocity(0.2);  // Match Isaac Lab
    // Use TGS solver to match Isaac Lab (default is PGS)
    if (PhysX.PxSolverTypeEnum && PhysX.PxSolverTypeEnum.eTGS !== undefined) {
        sceneDesc.set_solverType(PhysX.PxSolverTypeEnum.eTGS);
        console.log('Using TGS solver (matching Isaac Lab)');
    } else {
        console.log('TGS solver not available, using default PGS');
    }
    // Match Isaac Lab scene-level friction settings
    if (typeof sceneDesc.set_frictionType === 'function') {
        sceneDesc.set_frictionType(PhysX.PxFrictionTypeEnum.ePATCH);  // patch friction
    }
    if (typeof sceneDesc.set_frictionCorrelationDistance === 'function') {
        sceneDesc.set_frictionCorrelationDistance(0.025);
    }
    if (typeof sceneDesc.set_frictionOffsetThreshold === 'function') {
        sceneDesc.set_frictionOffsetThreshold(0.04);
    }
    pxScene = physics.createScene(sceneDesc);

    // Material
    material = physics.createMaterial(1.0, 1.0, 0.0);

    // Ground plane as a large static box
    const groundShapeFlags = new PhysX.PxShapeFlags(SHAPE_FLAGS_VAL);
    const groundGeom = new PhysX.PxBoxGeometry(50, 50, 0.5)  // Z-up: thin in Z;
    const groundShape = physics.createShape(groundGeom, material, true, groundShapeFlags);
    // Ground: group 1, collides with group 1 and 2
    const groundFilterData = new PhysX.PxFilterData(1, 3, 0, 0);
    groundShape.setSimulationFilterData(groundFilterData);
    const groundPose = new PhysX.PxTransform(
        new PhysX.PxVec3(0, 0, -0.5),  // top surface at z=0
        new PhysX.PxQuat(0, 0, 0, 1)
    );
    groundActor = physics.createRigidStatic(groundPose);
    groundActor.attachShape(groundShape);
    // Add ground to scene
    pxScene.addActor(groundActor);
    groundRemoved = false;

    console.log('PhysX scene created');
}

// ---------------------------------------------------------------------------
// Build PhysX articulation from humanoid data
// ---------------------------------------------------------------------------
function buildArticulation() {
    setStatus('Building humanoid articulation...');

    const shapeFlags = new PhysX.PxShapeFlags(SHAPE_FLAGS_VAL);
    const rbext = PhysX.PxRigidBodyExt.prototype;

    articulation = physics.createArticulationReducedCoordinate();
    // Isaac Lab: USD articulation=32/1, but scene maxPositionIterationCount=4 caps it
    // The effective iterations in Isaac Lab are 4/0
    // PhysX WASM has no scene cap, so we set the effective value directly
    articulation.setSolverIterationCounts(16, 4);
    // Match Isaac Lab: sleep threshold and stabilization threshold
    if (typeof articulation.setSleepThreshold === 'function') {
        articulation.setSleepThreshold(5e-5);
    }
    if (typeof articulation.setStabilizationThreshold === 'function') {
        articulation.setStabilizationThreshold(1e-5);
    }
    // Disable self-collision (matching env code: enable_self_collisions=False)
    articulation.setArticulationFlag(
        PhysX.PxArticulationFlagEnum.eDISABLE_SELF_COLLISION, true
    );

    const bodyLinkMap = {};  // name -> PxArticulationLink
    links = [];

    for (const body of humanoidData.bodies) {
        const wp = body.pos;  // already Z-up from MJCF
        // Use T-pose height so feet don't penetrate ground during articulation construction
        const zOff = humanoidData.tpose_pelvis_z || humanoidData.pelvis_z;
        const pose = new PhysX.PxTransform(
            new PhysX.PxVec3(wp[0], wp[1], wp[2] + zOff),
            new PhysX.PxQuat(0, 0, 0, 1)
        );

        const parentLink = body.parent ? bodyLinkMap[body.parent] : null;
        const link = articulation.createLink(parentLink, pose);

        // Attach geom shapes
        for (const geom of body.geoms) {
            let shape = null;
            if (geom.type === 'sphere') {
                const g = new PhysX.PxSphereGeometry(geom.radius);
                shape = physics.createShape(g, material, true, shapeFlags);
                const lp = geom.pos;  // already Z-up
                shape.setLocalPose(new PhysX.PxTransform(
                    new PhysX.PxVec3(lp[0], lp[1], lp[2]),
                    new PhysX.PxQuat(0, 0, 0, 1)
                ));
            } else if (geom.type === 'capsule' && geom.fromto) {
                const ft = geom.fromto;  // already Z-up
                const p0 = [ft[0], ft[1], ft[2]];
                const p1 = [ft[3], ft[4], ft[5]];
                const dx = p1[0]-p0[0], dy = p1[1]-p0[1], dz = p1[2]-p0[2];
                const len = Math.sqrt(dx*dx+dy*dy+dz*dz);
                const halfH = Math.max(len / 2, 0.001);
                const g = new PhysX.PxCapsuleGeometry(geom.radius, halfH);
                shape = physics.createShape(g, material, true, shapeFlags);
                const mid = [(p0[0]+p1[0])/2, (p0[1]+p1[1])/2, (p0[2]+p1[2])/2];
                const dir = len > 0.001 ? [dx/len, dy/len, dz/len] : [1,0,0];
                const q = quatFromTwoVec([1,0,0], dir);
                shape.setLocalPose(new PhysX.PxTransform(
                    new PhysX.PxVec3(mid[0], mid[1], mid[2]),
                    new PhysX.PxQuat(q[0], q[1], q[2], q[3])
                ));
            } else if (geom.type === 'box') {
                const he = geom.halfExtents;  // already Z-up [x, y, z]
                const g = new PhysX.PxBoxGeometry(he[0], he[1], he[2]);
                shape = physics.createShape(g, material, true, shapeFlags);
                const lp = geom.pos;  // already Z-up
                shape.setLocalPose(new PhysX.PxTransform(
                    new PhysX.PxVec3(lp[0], lp[1], lp[2]),
                    new PhysX.PxQuat(0, 0, 0, 1)
                ));
            } else if (geom.type === 'cylinder') {
                // Approximate cylinder with capsule
                const r = geom.radius;
                if (geom.fromto) {
                    const ft = geom.fromto;  // already Z-up
                    const p0 = [ft[0], ft[1], ft[2]];
                    const p1 = [ft[3], ft[4], ft[5]];
                    const dx = p1[0]-p0[0], dy = p1[1]-p0[1], dz = p1[2]-p0[2];
                    const len = Math.sqrt(dx*dx+dy*dy+dz*dz);
                    const halfH = Math.max(len / 2, 0.001);
                    const g = new PhysX.PxCapsuleGeometry(r, halfH);
                    shape = physics.createShape(g, material, true, shapeFlags);
                    const mid = [(p0[0]+p1[0])/2, (p0[1]+p1[1])/2, (p0[2]+p1[2])/2];
                    const dir = len > 0.001 ? [dx/len, dy/len, dz/len] : [0,0,1];
                    const q = quatFromTwoVec([1,0,0], dir);
                    shape.setLocalPose(new PhysX.PxTransform(
                        new PhysX.PxVec3(mid[0], mid[1], mid[2]),
                        new PhysX.PxQuat(q[0], q[1], q[2], q[3])
                    ));
                } else {
                    // Default cylinder along Z in MJCF
                    const hh = geom.halfHeight || 0.015;
                    const g = new PhysX.PxCapsuleGeometry(r, hh);
                    shape = physics.createShape(g, material, true, shapeFlags);
                    const lp = geom.pos || [0,0,0];  // already Z-up
                    // Rotate capsule X-axis to Z-axis
                    const q = quatFromTwoVec([1,0,0], [0,0,1]);
                    shape.setLocalPose(new PhysX.PxTransform(
                        new PhysX.PxVec3(lp[0], lp[1], lp[2]),
                        new PhysX.PxQuat(q[0], q[1], q[2], q[3])
                    ));
                }
            }
            if (shape) {
                // Articulation shapes: group 2, collide with group 1 (ground) only
                shape.setSimulationFilterData(new PhysX.PxFilterData(2, 1, 0, 0));
                link.attachShape(shape);
            }
        }

        // Set exact mass, inertia tensor, and COM from Newton/MuJoCo reference
        if (body.mass && body.inertia && body.com) {
            link.setMass(body.mass);
            link.setMassSpaceInertiaTensor(new PhysX.PxVec3(body.inertia[0], body.inertia[1], body.inertia[2]));
            link.setCMassLocalPose(new PhysX.PxTransform(
                new PhysX.PxVec3(body.com[0], body.com[1], body.com[2]),
                new PhysX.PxQuat(0, 0, 0, 1)
            ));
        } else if (body.mass) {
            rbext.setMassAndUpdateInertia(link, body.mass);
        } else {
            rbext.updateMassAndInertia(link, 1000);
        }

        // Match Isaac Lab rigid body properties (from USD inspection)
        link.setAngularDamping(0.01);
        link.setLinearDamping(0.0);
        link.setMaxDepenetrationVelocity(10.0);
        link.setMaxLinearVelocity(1000.0);
        link.setMaxAngularVelocity(1000.0);
        // Per-body solver iterations - scene caps at 4/0, so setting higher is no-op in Isaac Lab
        // Match effective iterations: 4 position, 0 velocity
        if (typeof link.setSolverIterationCounts === 'function') {
            link.setSolverIterationCounts(16, 4);
        }
        // Sleep threshold (Isaac Lab: 5e-5)
        if (typeof link.setSleepThreshold === 'function') {
            link.setSleepThreshold(5e-5);
        }
        // Stabilization threshold (Isaac Lab: 1e-5)
        if (typeof link.setStabilizationThreshold === 'function') {
            link.setStabilizationThreshold(1e-5);
        }
        // CFM scale (Isaac Lab: 0.025) - adds compliance to constraints
        if (typeof link.setCfmScale === 'function') {
            link.setCfmScale(0.025);
        }
        // Enable gyroscopic forces (Isaac Lab: true)
        if (typeof link.setRigidBodyFlag === 'function') {
            try { link.setRigidBodyFlag(PhysX.PxRigidBodyFlagEnum.eENABLE_GYROSCOPIC_FORCES, true); } catch(e) {}
        }

        bodyLinkMap[body.name] = link;
        links.push({ name: body.name, link: link, meshGroup: null });
    }

    // Configure joints
    const axisEnums = [E_TWIST, E_SWING1, E_SWING2];
    origDrives.length = 0;

    for (const jdata of humanoidData.joints) {
        const childLink = bodyLinkMap[jdata.child_body];
        const joint = childLink.getInboundJoint();

        if (jdata.jointType === 'spherical') {
            joint.setJointType(E_SPHERICAL);
        } else {
            joint.setJointType(E_REVOLUTE);
        }

        // Match Isaac Lab: joint friction = 0 (PhysX default is 0.05)
        joint.setFrictionCoefficient(0);
        // Match Isaac Lab: max joint velocity = 1000000
        if (typeof joint.setMaxJointVelocity === 'function') {
            joint.setMaxJointVelocity(1000000);
        }

        // Joint frame poses - localPos0 and localRot are Z-up, use directly
        const lp = jdata.localPos0;
        const lr = jdata.localRot; // [w, x, y, z]

        const parentPose = new PhysX.PxTransform(
            new PhysX.PxVec3(lp[0], lp[1], lp[2]),
            new PhysX.PxQuat(lr[1], lr[2], lr[3], lr[0])  // PxQuat(x,y,z,w)
        );
        const childPose = new PhysX.PxTransform(
            new PhysX.PxVec3(0, 0, 0),
            new PhysX.PxQuat(lr[1], lr[2], lr[3], lr[0])
        );
        joint.setParentPose(parentPose);
        joint.setChildPose(childPose);

        if (jdata.jointType === 'spherical') {
            for (let i = 0; i < jdata.axes.length; i++) {
                const physAxis = jdata.axisMap[i];
                const axE = axisEnums[physAxis];
                joint.setMotion(axE, E_LIMITED);
                const ax = jdata.axes[i];
                const limit = new PhysX.PxArticulationLimit(ax.range[0], ax.range[1]);
                joint.setLimitParams(axE, limit);
                const drive = new PhysX.PxArticulationDrive(
                    ax.stiffness, ax.damping, ax.maxForce, E_FORCE
                );
                joint.setDriveParams(axE, drive);
                // Set joint armature (adds virtual inertia for stability)
                if (ax.armature !== undefined) joint.setArmature(axE, ax.armature);
                origDrives.push({joint, axisEnum: axE, stiffness: ax.stiffness, damping: ax.damping, maxForce: ax.maxForce});
            }
            // Lock unused axes
            for (let i = jdata.axes.length; i < 3; i++) {
                joint.setMotion(axisEnums[i], E_LOCKED);
            }
        } else {
            // Revolute: only twist
            joint.setMotion(E_TWIST, E_LIMITED);
            const ax = jdata.axes[0];
            joint.setLimitParams(E_TWIST, new PhysX.PxArticulationLimit(ax.range[0], ax.range[1]));
            const revDrive = new PhysX.PxArticulationDrive(
                ax.stiffness, ax.damping, ax.maxForce, E_FORCE
            );
            joint.setDriveParams(E_TWIST, revDrive);
            // Set joint armature
            if (ax.armature !== undefined) joint.setArmature(E_TWIST, ax.armature);
            origDrives.push({joint, axisEnum: E_TWIST, stiffness: ax.stiffness, damping: ax.damping, maxForce: ax.maxForce});
            joint.setMotion(E_SWING1, E_LOCKED);
            joint.setMotion(E_SWING2, E_LOCKED);
        }
    }

    // Fixed joints
    for (const fj of humanoidData.fixedJoints) {
        const childLink = bodyLinkMap[fj.child_body];
        const joint = childLink.getInboundJoint();
        joint.setJointType(E_FIX);
        const lp = fj.localPos0;  // already Z-up
        joint.setParentPose(new PhysX.PxTransform(
            new PhysX.PxVec3(lp[0], lp[1], lp[2]),
            new PhysX.PxQuat(0, 0, 0, 1)
        ));
        joint.setChildPose(new PhysX.PxTransform(
            new PhysX.PxVec3(0, 0, 0),
            new PhysX.PxQuat(0, 0, 0, 1)
        ));
    }

    // Remove ground before adding articulation so init pose doesn't collide
    removeGround();
    pxScene.addArticulation(articulation);
    console.log('Articulation built with', links.length, 'links,', articulation.getDofs(), 'DOFs');

    // Apply init_pose from env config (combat-ready stance, not T-pose)
    applyInitPose();

    scheduleGroundRestore();
}

function applyInitPose() {
    if (!humanoidData.init_root_pos || !humanoidData.init_dof_pos) return;

    const rp = humanoidData.init_root_pos;
    const rq = humanoidData.init_root_rot_quat; // [x,y,z,w]
    const initDof = humanoidData.init_dof_pos;

    // Use FK-based state injection to get correct link positions
    injectStateViaFK(rp, rq, initDof, null);

    // Also set drive targets to init pose
    const axisEnums = [E_TWIST, E_SWING1, E_SWING2];
    const bodyLinkMap = {};
    for (const l of links) bodyLinkMap[l.name] = l.link;
    for (let i = 0; i < humanoidData.dofInfo.length; i++) {
        const dof = humanoidData.dofInfo[i];
        const childLink = bodyLinkMap[dof.child_body];
        if (!childLink) continue;
        try {
            childLink.getInboundJoint().setDriveTarget(axisEnums[dof.physx_axis], initDof[i]);
        } catch(e) {}
    }

    console.log('Applied init_pose via cache FK: root_z=' + rp[2] + ', dofs=' + initDof.length);
}

// ---------------------------------------------------------------------------
// Ground collision control — remove ground during state-setting to prevent
// applyCache from resolving ground collisions (which distorts leg positions)
// ---------------------------------------------------------------------------
// groundRemoved is set in initPhysX()
function removeGround() { if (groundActor && !groundRemoved) { pxScene.removeActor(groundActor); groundRemoved = true; } }
function restoreGround() { if (groundActor && groundRemoved) { pxScene.addActor(groundActor); groundRemoved = false; } }
// Schedule ground restore after next sim step
let restoreGroundAfterStep = false;
function scheduleGroundRestore() { restoreGroundAfterStep = true; }

// Apply cache with ground temporarily removed.
// Uses ePOSITION | eROOT_TRANSFORM | eVELOCITY (NOT eALL) so that PhysX
// recomputes link world positions via FK from DOF values, rather than
// restoring old link transforms from the cache (which eALL would do).
function applyCacheNoGround() {
    const flagVal = PhysX.PxArticulationCacheFlagEnum.ePOSITION |
                    PhysX.PxArticulationCacheFlagEnum.eROOT_TRANSFORM |
                    PhysX.PxArticulationCacheFlagEnum.eVELOCITY;
    const flags = new PhysX.PxArticulationCacheFlags(flagVal);
    const cache = articulation.createCache();
    articulation.copyInternalStateToCache(cache, flags);
    removeGround();
    articulation.applyCache(cache, flags, true);
    restoreGround();
}

// ---------------------------------------------------------------------------
// FK-based state injection: compute correct link world transforms from DOF
// values using JS expmap FK, then inject into PhysX via cache.
// This bypasses PhysX WASM's internal DOF→rotation resolution which uses a
// different convention than MimicKit's expmap representation.
// ---------------------------------------------------------------------------
function injectStateViaFK(rootPos, rootRot, dofPos, dofVel) {
    const axisEnums = [E_TWIST, E_SWING1, E_SWING2];

    // 1. Compute joint rotations from DOF values using expmap (MimicKit convention)
    const jointRotQuats = [];
    for (const kj of humanoidData.kinematicJoints) {
        let quat;
        if (kj.type === 'SPHERICAL') {
            quat = expMapToQuat(dofPos[kj.dof_idx], dofPos[kj.dof_idx+1], dofPos[kj.dof_idx+2]);
        } else if (kj.type === 'HINGE') {
            quat = axisAngleToQuat(kj.axis, dofPos[kj.dof_idx]);
        } else {
            quat = [0, 0, 0, 1];
        }
        jointRotQuats.push(quat);
    }

    // 2. Compute FK to get world-space body poses
    const numBodies = humanoidData.fk_parent_indices.length;
    const fkPos = new Array(numBodies);
    const fkRot = new Array(numBodies);
    fkPos[0] = rootPos;
    fkRot[0] = rootRot;

    for (let j = 1; j < numBodies; j++) {
        const jRot = jointRotQuats[j - 1];
        const localTrans = humanoidData.fk_local_translations[j];
        const localRot = humanoidData.fk_local_rotations[j];
        const parentIdx = humanoidData.fk_parent_indices[j];
        const parentPos = fkPos[parentIdx];
        const parentRot = fkRot[parentIdx];
        const worldTrans = quatRotateVec(parentRot, localTrans);
        fkPos[j] = [parentPos[0]+worldTrans[0], parentPos[1]+worldTrans[1], parentPos[2]+worldTrans[2]];
        const localCombined = quatMul(localRot, jRot);
        fkRot[j] = quatMul(parentRot, localCombined);
    }

    // 3. Set root pose
    articulation.setRootGlobalPose(new PhysX.PxTransform(
        new PhysX.PxVec3(rootPos[0], rootPos[1], rootPos[2]),
        new PhysX.PxQuat(rootRot[0], rootRot[1], rootRot[2], rootRot[3])
    ), true);

    // 4. Set DOF positions and velocities via per-joint API
    const bodyLinkMap = {};
    for (const l of links) bodyLinkMap[l.name] = l.link;

    for (let i = 0; i < humanoidData.dofInfo.length; i++) {
        const dof = humanoidData.dofInfo[i];
        const childLink = bodyLinkMap[dof.child_body];
        if (!childLink) continue;
        try {
            const joint = childLink.getInboundJoint();
            joint.setJointPosition(axisEnums[dof.physx_axis], dofPos[i]);
            joint.setJointVelocity(axisEnums[dof.physx_axis], dofVel ? dofVel[i] : 0);
        } catch(e) {}
    }

    // 5. Apply cache to propagate state
    removeGround();
    const flags = new PhysX.PxArticulationCacheFlags(PhysX.PxArticulationCacheFlagEnum.eALL);
    const cache = articulation.createCache();
    articulation.copyInternalStateToCache(cache, flags);
    articulation.applyCache(cache, flags, true);

    // 6. Override link world transforms with correct FK poses
    // This fixes the mismatch between PhysX's internal DOF→rotation and expmap
    for (let j = 0; j < numBodies && j < links.length; j++) {
        const p = fkPos[j];
        const r = fkRot[j]; // xyzw
        links[j].link.setGlobalPose(new PhysX.PxTransform(
            new PhysX.PxVec3(p[0], p[1], p[2]),
            new PhysX.PxQuat(r[0], r[1], r[2], r[3])
        ), true);
    }
    restoreGround();
}

// ---------------------------------------------------------------------------
// Debug helpers
// ---------------------------------------------------------------------------
function applyDriveParams() {
    for (const d of origDrives) {
        const drive = new PhysX.PxArticulationDrive(
            drivesEnabled ? d.stiffness * stiffnessScale : 0,
            drivesEnabled ? d.damping * dampingScale : 0,
            drivesEnabled ? d.maxForce : 0,
            E_FORCE
        );
        d.joint.setDriveParams(d.axisEnum, drive);
    }
}

function setSelfCollision(enabled) {
    selfCollisionEnabled = enabled;
    // Update articulation flag
    articulation.setArticulationFlag(
        PhysX.PxArticulationFlagEnum.eDISABLE_SELF_COLLISION, !enabled
    );
    // Also update filter data on all articulation link shapes
    for (const entry of links) {
        const nbShapes = entry.link.getNbShapes();
        for (let si = 0; si < nbShapes; si++) {
            const shape = entry.link.getShape(si);
            if (enabled) {
                // group 2, collide with group 1 and 2
                shape.setSimulationFilterData(new PhysX.PxFilterData(2, 3, 0, 0));
            } else {
                // group 2, collide with group 1 only (ground only)
                shape.setSimulationFilterData(new PhysX.PxFilterData(2, 1, 0, 0));
            }
        }
    }
}

function setGravity(enabled) {
    gravityEnabled = enabled;
    if (enabled) {
        pxScene.setGravity(new PhysX.PxVec3(0, 0, -9.81));
    } else {
        pxScene.setGravity(new PhysX.PxVec3(0, 0, 0));
    }
}

function updateDebugInfo() {
    try {
        const rootLink = links[0].link;
        const pose = rootLink.getGlobalPose();
        const vel = rootLink.getLinearVelocity();
        const rootZ = pose.get_p().get_z();
        const speed = Math.sqrt(vel.get_x()**2 + vel.get_y()**2 + vel.get_z()**2);

        let maxDofVel = 0;
        try {
            for (const d of origDrives) {
                const v = Math.abs(d.joint.getJointVelocity(d.axisEnum));
                if (v > maxDofVel) maxDofVel = v;
            }
        } catch(e) { /* some joints may not support velocity query */ }

        const wsInfo = wsMaxDiff !== null ? wsMaxDiff.toExponential(3) : '--';
        document.getElementById('debugInfo').innerHTML =
            `root_z: ${rootZ.toFixed(3)}<br>` +
            `root_speed: ${speed.toFixed(3)}<br>` +
            `max_dof_vel: ${maxDofVel.toFixed(1)}<br>` +
            `links: ${links.length} / DOFs: ${articulation.getDofs()}<br>` +
            `ws_max_diff: ${wsInfo}`;
    } catch(e) {
        // Silently skip if articulation not ready
    }
}

// ---------------------------------------------------------------------------
// Three.js setup
// ---------------------------------------------------------------------------
const BODY_COLORS = {
    pelvis: 0x5577aa, torso: 0x5577aa, head: 0xcc8866,
    right_upper_arm: 0x77aa55, right_lower_arm: 0x77aa55, right_hand: 0xcc8866,
    sword: 0xcccccc,
    left_upper_arm: 0xaa7755, left_lower_arm: 0xaa7755, shield: 0x8888cc, left_hand: 0xcc8866,
    right_thigh: 0x5577aa, right_shin: 0x5577aa, right_foot: 0x555577,
    left_thigh: 0x5577aa, left_shin: 0x5577aa, left_foot: 0x555577,
};

function initThreeJS() {
    setStatus('Setting up renderer...');

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.body.appendChild(renderer.domElement);

    scene3d = new THREE.Scene();
    scene3d.background = new THREE.Color(0x1a1a2e);
    scene3d.fog = new THREE.Fog(0x1a1a2e, 15, 40);

    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(3, 2, 4);
    camera.lookAt(0, 1, 0);

    controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.1;
    controls.update();

    // Lights
    scene3d.add(new THREE.AmbientLight(0x404060, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 30;
    dirLight.shadow.camera.left = -5;
    dirLight.shadow.camera.right = 5;
    dirLight.shadow.camera.top = 5;
    dirLight.shadow.camera.bottom = -5;
    scene3d.add(dirLight);
    scene3d.add(new THREE.HemisphereLight(0x8888cc, 0x444422, 0.4));

    // World group: rotates Z-up (PhysX/MJCF) to Y-up (Three.js)
    worldGroup = new THREE.Group();
    worldGroup.rotation.x = -Math.PI / 2;
    scene3d.add(worldGroup);

    // Ground plane + grid (only add if PhysX ground is active)
    const groundGeo = new THREE.PlaneGeometry(40, 40);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a2a4a, roughness: 0.9, metalness: 0.1 });
    const groundMesh = new THREE.Mesh(groundGeo, groundMat);
    groundMesh.receiveShadow = true;
    const grid = new THREE.GridHelper(40, 40, 0x3a3a5e, 0x2a2a4a);
    grid.rotation.x = Math.PI / 2;
    grid.position.z = 0.001;
    worldGroup.add(groundMesh);
    worldGroup.add(grid);

    // Create meshes per body (all in Z-up, parented to worldGroup)
    for (let bi = 0; bi < humanoidData.bodies.length; bi++) {
        const body = humanoidData.bodies[bi];
        const group = new THREE.Group();
        const color = BODY_COLORS[body.name] || 0x888888;

        for (const geom of body.geoms) {
            const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.6, metalness: 0.2 });
            let mesh = null;

            if (geom.type === 'sphere') {
                mesh = new THREE.Mesh(new THREE.SphereGeometry(geom.radius, 16, 12), mat);
                const lp = geom.pos;  // Z-up
                mesh.position.set(lp[0], lp[1], lp[2]);
            } else if (geom.type === 'capsule' && geom.fromto) {
                const ft = geom.fromto;  // Z-up
                const p0 = new THREE.Vector3(ft[0], ft[1], ft[2]);
                const p1 = new THREE.Vector3(ft[3], ft[4], ft[5]);
                const dir = new THREE.Vector3().subVectors(p1, p0);
                const len = dir.length();
                mesh = new THREE.Mesh(new THREE.CapsuleGeometry(geom.radius, len, 8, 12), mat);
                mesh.position.addVectors(p0, p1).multiplyScalar(0.5);
                if (len > 0.001) {
                    mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
                }
            } else if (geom.type === 'box') {
                const he = geom.halfExtents;  // Z-up [x, y, z]
                mesh = new THREE.Mesh(new THREE.BoxGeometry(he[0]*2, he[1]*2, he[2]*2), mat);
                const lp = geom.pos;  // Z-up
                mesh.position.set(lp[0], lp[1], lp[2]);
            } else if (geom.type === 'cylinder') {
                const r = geom.radius;
                if (geom.fromto) {
                    const ft = geom.fromto;  // Z-up
                    const p0 = new THREE.Vector3(ft[0], ft[1], ft[2]);
                    const p1 = new THREE.Vector3(ft[3], ft[4], ft[5]);
                    const dir = new THREE.Vector3().subVectors(p1, p0);
                    const len = Math.max(dir.length(), 0.01);
                    mesh = new THREE.Mesh(new THREE.CylinderGeometry(r, r, len, 16), mat);
                    mesh.position.addVectors(p0, p1).multiplyScalar(0.5);
                    if (len > 0.001) {
                        mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
                    }
                } else {
                    const hh = geom.halfHeight || 0.015;
                    mesh = new THREE.Mesh(new THREE.CylinderGeometry(r, r, hh*2, 16), mat);
                    const lp = geom.pos || [0,0,0];  // Z-up
                    mesh.position.set(lp[0], lp[1], lp[2]);
                }
            }
            if (mesh) { mesh.castShadow = true; group.add(mesh); }
        }

        worldGroup.add(group);
        links[bi].meshGroup = group;
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
}

// ---------------------------------------------------------------------------
// Update Three.js meshes from PhysX link poses
// ---------------------------------------------------------------------------
function updateMeshes() {
    for (const entry of links) {
        if (!entry.meshGroup) continue;
        const pose = entry.link.getGlobalPose();
        const p = pose.get_p();
        const q = pose.get_q();
        entry.meshGroup.position.set(p.get_x(), p.get_y(), p.get_z());
        entry.meshGroup.quaternion.set(q.get_x(), q.get_y(), q.get_z(), q.get_w());
    }
}

// ---------------------------------------------------------------------------
// Quaternion / vector math utilities for observation building.
// Quaternion convention matches MimicKit's torch_util: [x, y, z, w].
// All observation math is done in Z-up frame (MimicKit training convention).
// PhysX now runs in Z-up natively, so no coordinate conversions are needed.
// ---------------------------------------------------------------------------

// Rotate vector v by quaternion q, both in [x,y,z] / [x,y,z,w] format.
// Matches torch_util.quat_rotate: v + 2*w*(qv x v) + 2*(qv x (qv x v))
function quatRotateVec(q, v) {
    const [qx, qy, qz, qw] = q;
    const [vx, vy, vz] = v;
    // t = 2 * cross(q_xyz, v)
    const tx = 2 * (qy*vz - qz*vy);
    const ty = 2 * (qz*vx - qx*vz);
    const tz = 2 * (qx*vy - qy*vx);
    return [
        vx + qw*tx + (qy*tz - qz*ty),
        vy + qw*ty + (qz*tx - qx*tz),
        vz + qw*tz + (qx*ty - qy*tx)
    ];
}

// Quaternion multiply a * b, both [x,y,z,w]
function quatMul(a, b) {
    const [ax,ay,az,aw] = a, [bx,by,bz,bw] = b;
    return [
        aw*bx + ax*bw + ay*bz - az*by,
        aw*by - ax*bz + ay*bw + az*bx,
        aw*bz + ax*by - ay*bx + az*bw,
        aw*bw - ax*bx - ay*by - az*bz
    ];
}

// Normalize quaternion
function quatNorm(q) {
    const [x,y,z,w] = q;
    const len = Math.sqrt(x*x + y*y + z*z + w*w) || 1;
    return [x/len, y/len, z/len, w/len];
}

// Axis-angle to quaternion [x,y,z,w] (matches torch_util.axis_angle_to_quat)
function axisAngleToQuat(axis, angle) {
    const ha = angle * 0.5;
    const s = Math.sin(ha), c = Math.cos(ha);
    const len = Math.sqrt(axis[0]*axis[0] + axis[1]*axis[1] + axis[2]*axis[2]) || 1;
    return quatNorm([axis[0]/len*s, axis[1]/len*s, axis[2]/len*s, c]);
}

// Exponential map (3D) to quaternion [x,y,z,w] (matches torch_util.exp_map_to_quat)
function expMapToQuat(ex, ey, ez) {
    const angle = Math.sqrt(ex*ex + ey*ey + ez*ez);
    if (angle < 1e-5) return [0, 0, 0, 1];
    return axisAngleToQuat([ex/angle, ey/angle, ez/angle], angle);
}

// Compute heading angle from quaternion (rotation of X-axis projected to XY plane in Z-up)
// Matches torch_util.calc_heading
function calcHeading(q) {
    const rotDir = quatRotateVec(q, [1, 0, 0]);
    return Math.atan2(rotDir[1], rotDir[0]);
}

// Compute inverse heading quaternion (rotation around Z axis by -heading)
// Matches torch_util.calc_heading_quat_inv
function calcHeadingQuatInv(q) {
    const heading = calcHeading(q);
    return axisAngleToQuat([0, 0, 1], -heading);
}

// Convert quaternion to 6D tan_norm representation.
// tan = quat_rotate(q, [1,0,0])  (rotated X axis)
// norm = quat_rotate(q, [0,0,1]) (rotated Z axis)
// result = [tan(3), norm(3)] = 6 values
// Matches torch_util.quat_to_tan_norm
function quatToTanNorm(q) {
    const tan = quatRotateVec(q, [1, 0, 0]);
    const norm = quatRotateVec(q, [0, 0, 1]);
    return [tan[0], tan[1], tan[2], norm[0], norm[1], norm[2]];
}

// ---------------------------------------------------------------------------
// Build observation vector - matches Python compute_char_obs exactly.
//
// Format (158 dims total):
//   root_height              (1)   - root Z in Z-up frame
//   root_rot_tan_norm        (6)   - local root rotation as tan_norm (heading removed)
//   root_vel                 (3)   - root linear velocity in heading frame
//   root_ang_vel             (3)   - root angular velocity in heading frame
//   joint_rot_tan_norm       (96)  - 16 joints * 6 (quaternion -> tan_norm)
//   dof_vel                  (31)  - joint velocities
//   key_body_local_pos       (18)  - 6 key bodies * 3 (relative to root, in heading frame)
//
// IMPORTANT: The ONNX model already contains the observation normalizer,
// so this function returns RAW (un-normalized) observations.
// ---------------------------------------------------------------------------
// Build observation from a raw state object (no PhysX reads).
// state = { root_pos, root_rot, root_vel, root_ang_vel, dof_pos, dof_vel, body_pos }
// ---------------------------------------------------------------------------
function buildObservationFromState(state) {
    const obs = new Float32Array(humanoidData.obs_dim);
    const rootPos = state.root_pos;
    const rootRot = state.root_rot;
    const rootVel = state.root_vel;
    const rootAngVel = state.root_ang_vel;

    const heading = calcHeading(rootRot);
    const headingInv = axisAngleToQuat([0, 0, 1], -heading);

    let idx = 0;

    // [0] Root height
    obs[idx++] = rootPos[2];

    // [1..6] Root rotation (heading-local tan_norm)
    if (humanoidData.global_obs) {
        const tn = quatToTanNorm(rootRot);
        for (let i = 0; i < 6; i++) obs[idx++] = tn[i];
    } else {
        const localRootRot = quatMul(headingInv, rootRot);
        const tn = quatToTanNorm(localRootRot);
        for (let i = 0; i < 6; i++) obs[idx++] = tn[i];
    }

    // [7..9] Root velocity
    if (humanoidData.global_obs) {
        obs[idx++] = rootVel[0]; obs[idx++] = rootVel[1]; obs[idx++] = rootVel[2];
    } else {
        const lv = quatRotateVec(headingInv, rootVel);
        obs[idx++] = lv[0]; obs[idx++] = lv[1]; obs[idx++] = lv[2];
    }

    // [10..12] Root angular velocity
    if (humanoidData.global_obs) {
        obs[idx++] = rootAngVel[0]; obs[idx++] = rootAngVel[1]; obs[idx++] = rootAngVel[2];
    } else {
        const la = quatRotateVec(headingInv, rootAngVel);
        obs[idx++] = la[0]; obs[idx++] = la[1]; obs[idx++] = la[2];
    }

    // [13..108] Joint rotations as tan_norm
    const dofPositions = state.dof_pos;
    const jointRotQuats = [];
    for (const kj of humanoidData.kinematicJoints) {
        let quat;
        if (kj.type === 'SPHERICAL') {
            quat = expMapToQuat(dofPositions[kj.dof_idx], dofPositions[kj.dof_idx+1], dofPositions[kj.dof_idx+2]);
        } else if (kj.type === 'HINGE') {
            quat = axisAngleToQuat(kj.axis, dofPositions[kj.dof_idx]);
        } else {
            quat = [0, 0, 0, 1];
        }
        jointRotQuats.push(quat);
        const tn = quatToTanNorm(quat);
        for (let k = 0; k < 6; k++) obs[idx++] = tn[k];
    }

    // DOF velocities
    for (let i = 0; i < state.dof_vel.length; i++) {
        obs[idx++] = state.dof_vel[i];
    }

    // Key body positions via FK
    if (humanoidData.fk_parent_indices && humanoidData.fk_local_translations) {
        const numBodies = humanoidData.fk_parent_indices.length;
        const fkPos = new Array(numBodies);
        const fkRot = new Array(numBodies);
        fkPos[0] = rootPos;
        fkRot[0] = rootRot;

        for (let j = 1; j < numBodies; j++) {
            const jRot = jointRotQuats[j - 1];
            const localTrans = humanoidData.fk_local_translations[j];
            const localRot = humanoidData.fk_local_rotations[j];
            const parentIdx = humanoidData.fk_parent_indices[j];
            const parentPos = fkPos[parentIdx];
            const parentRot = fkRot[parentIdx];
            const worldTrans = quatRotateVec(parentRot, localTrans);
            fkPos[j] = [parentPos[0]+worldTrans[0], parentPos[1]+worldTrans[1], parentPos[2]+worldTrans[2]];
            const localCombined = quatMul(localRot, jRot);
            fkRot[j] = quatMul(parentRot, localCombined);
        }

        const keyIds = humanoidData.key_body_ids;
        for (const bid of keyIds) {
            const bp = fkPos[bid];
            const rel = [bp[0] - rootPos[0], bp[1] - rootPos[1], bp[2] - rootPos[2]];
            if (humanoidData.global_obs) {
                obs[idx++] = rel[0]; obs[idx++] = rel[1]; obs[idx++] = rel[2];
            } else {
                const lr = quatRotateVec(headingInv, rel);
                obs[idx++] = lr[0]; obs[idx++] = lr[1]; obs[idx++] = lr[2];
            }
        }
    }

    return obs;
}

// ---------------------------------------------------------------------------
function buildObservation() {
    const obs = new Float32Array(humanoidData.obs_dim);
    const axisEnums = [E_TWIST, E_SWING1, E_SWING2];

    // Build body link map
    const bodyLinkMap = {};
    for (const l of links) bodyLinkMap[l.name] = l.link;

    // --- Get root state from PhysX (already Z-up) ---
    const rootPose = links[0].link.getGlobalPose();
    const rpx = rootPose.get_p();
    const rqx = rootPose.get_q();

    // Root position - already Z-up
    const rootPos = [rpx.get_x(), rpx.get_y(), rpx.get_z()];
    // Root quaternion - already Z-up [x,y,z,w]
    const rootRot = [rqx.get_x(), rqx.get_y(), rqx.get_z(), rqx.get_w()];

    // Root velocity - already Z-up
    const rv = links[0].link.getLinearVelocity();
    const rootVel = [rv.get_x(), rv.get_y(), rv.get_z()];
    // Root angular velocity - already Z-up
    const raw = links[0].link.getAngularVelocity();
    const rootAngVel = [raw.get_x(), raw.get_y(), raw.get_z()];

    // Compute heading inverse quaternion for local-frame transform
    const headingInv = calcHeadingQuatInv(rootRot);

    // Debug: log actual up-vector direction periodically
    if (!window._obsLogCount) window._obsLogCount = 0;
    window._obsLogCount++;
    if (window._obsLogCount % 60 === 1) {
        const upVec = quatRotateVec(rootRot, [0, 0, 1]);
        console.log('ROOT DEBUG: pos=' + rootPos.map(v=>v.toFixed(3)).join(',') +
            ' quat=[' + rootRot.map(v=>v.toFixed(4)).join(',') + ']' +
            ' upVec=[' + upVec.map(v=>v.toFixed(3)).join(',') + ']' +
            ' heading=' + calcHeading(rootRot).toFixed(3));
    }

    let idx = 0;

    // [0] Root height (Z coordinate in Z-up frame)
    obs[idx++] = rootPos[2];

    // [1..6] Root rotation in local heading frame as tan_norm (6)
    const localRootRot = quatMul(headingInv, rootRot);
    const rootTanNorm = quatToTanNorm(localRootRot);
    for (let i = 0; i < 6; i++) obs[idx++] = rootTanNorm[i];

    // [7..9] Root linear velocity in heading frame (3)
    const localVel = quatRotateVec(headingInv, rootVel);
    obs[idx++] = localVel[0];
    obs[idx++] = localVel[1];
    obs[idx++] = localVel[2];

    // [10..12] Root angular velocity in heading frame (3)
    const localAngVel = quatRotateVec(headingInv, rootAngVel);
    obs[idx++] = localAngVel[0];
    obs[idx++] = localAngVel[1];
    obs[idx++] = localAngVel[2];

    // [13..108] Joint rotations as tan_norm (16 joints x 6 = 96)
    // Read all 31 DOF positions using dofInfo to match Python kinematic model order
    const dofPositions = new Float32Array(31);
    for (let i = 0; i < humanoidData.dofInfo.length; i++) {
        const dof = humanoidData.dofInfo[i];
        const childLink = bodyLinkMap[dof.child_body];
        if (childLink) {
            try {
                const joint = childLink.getInboundJoint();
                dofPositions[i] = joint.getJointPosition(axisEnums[dof.physx_axis]);
            } catch(e) { dofPositions[i] = 0; }
        }
    }

    // Iterate kinematic joints and convert to tan_norm
    // Also store quaternions for FK computation later
    const jointRotQuats = [];
    for (const kj of humanoidData.kinematicJoints) {
        let quat;
        if (kj.type === 'SPHERICAL') {
            const ex = dofPositions[kj.dof_idx];
            const ey = dofPositions[kj.dof_idx + 1];
            const ez = dofPositions[kj.dof_idx + 2];
            quat = expMapToQuat(ex, ey, ez);
        } else if (kj.type === 'HINGE') {
            const angle = dofPositions[kj.dof_idx];
            quat = axisAngleToQuat(kj.axis, angle);  // axis is in Z-up coordinates
        } else {  // FIXED
            quat = [0, 0, 0, 1];  // identity
        }
        jointRotQuats.push(quat);
        const tn = quatToTanNorm(quat);
        for (let k = 0; k < 6; k++) obs[idx++] = tn[k];
    }

    // [109..139] DOF velocities (31)
    for (const dof of humanoidData.dofInfo) {
        try {
            const childLink = bodyLinkMap[dof.child_body];
            if (childLink) {
                const joint = childLink.getInboundJoint();
                obs[idx++] = joint.getJointVelocity(axisEnums[dof.physx_axis]);
            } else { obs[idx++] = 0; }
        } catch(e) { obs[idx++] = 0; }
    }

    // [140..157] Key body positions via JS-side forward kinematics
    // (Python uses kin_char_model.forward_kinematics via get_body_pos)
    if (humanoidData.fk_parent_indices && humanoidData.fk_local_translations) {
        const numBodies = humanoidData.fk_parent_indices.length;
        const fkPos = new Array(numBodies);
        const fkRot = new Array(numBodies);

        // Body 0 = root
        fkPos[0] = rootPos;
        fkRot[0] = rootRot;

        // jointRotQuats was built during joint rotation section above
        for (let j = 1; j < numBodies; j++) {
            const jRot = jointRotQuats[j - 1];
            const localTrans = humanoidData.fk_local_translations[j];
            const localRot = humanoidData.fk_local_rotations[j];
            const parentIdx = humanoidData.fk_parent_indices[j];

            const parentPos = fkPos[parentIdx];
            const parentRot = fkRot[parentIdx];

            const worldTrans = quatRotateVec(parentRot, localTrans);
            fkPos[j] = [parentPos[0] + worldTrans[0], parentPos[1] + worldTrans[1], parentPos[2] + worldTrans[2]];

            const localCombined = quatMul(localRot, jRot);
            fkRot[j] = quatMul(parentRot, localCombined);
        }

        // Key body positions from JS-side FK (matches Python kin_char_model)
        // Note: Isaac Lab's get_body_pos returns PhysX link positions which differ
        // from FK, but the policy was trained with the kin_char_model FK positions
        // passed through compute_char_obs.
        const keyIds = humanoidData.key_body_ids || [2, 5, 10, 13, 16, 6];
        for (const bid of keyIds) {
            const bp = fkPos[bid];
            const rel = [bp[0] - rootPos[0], bp[1] - rootPos[1], bp[2] - rootPos[2]];
            const localRel = quatRotateVec(headingInv, rel);
            obs[idx++] = localRel[0];
            obs[idx++] = localRel[1];
            obs[idx++] = localRel[2];
        }
    } else {
        idx += 18;
    }

    // No normalization here - the ONNX model handles it internally
    return obs;
}

// ---------------------------------------------------------------------------
// ONNX inference
// ---------------------------------------------------------------------------
async function runPolicy(obs) {
    const obsTensor = new ort.Tensor('float32', obs, [1, humanoidData.obs_dim]);
    const latentTensor = new ort.Tensor('float32', latentVec, [1, humanoidData.latent_dim]);
    const results = await onnxSession.run({ obs: obsTensor, latent: latentTensor });
    return results.action.data;
}

// ---------------------------------------------------------------------------
// Apply actions as PD drive targets
// ---------------------------------------------------------------------------
function applyActions(action) {
    const axisEnums = [E_TWIST, E_SWING1, E_SWING2];
    const bodyLinkMap = {};
    for (const l of links) bodyLinkMap[l.name] = l.link;

    // Clip actions to training bounds (matching env's _build_action_bounds_pos)
    const aLow = humanoidData.action_low;
    const aHigh = humanoidData.action_high;

    let appliedCount = 0;
    let clippedMin = Infinity, clippedMax = -Infinity;
    let rawMin = Infinity, rawMax = -Infinity;
    for (let i = 0; i < humanoidData.dofInfo.length; i++) {
        const dof = humanoidData.dofInfo[i];
        const childLink = bodyLinkMap[dof.child_body];
        if (!childLink) { continue; }
        try {
            const joint = childLink.getInboundJoint();
            if (!joint) continue;
            // Clip to action bounds
            let a = action[i];
            rawMin = Math.min(rawMin, a);
            rawMax = Math.max(rawMax, a);
            if (aLow && aHigh) {
                a = Math.max(aLow[i], Math.min(aHigh[i], a));
            }
            clippedMin = Math.min(clippedMin, a);
            clippedMax = Math.max(clippedMax, a);
            joint.setDriveTarget(axisEnums[dof.physx_axis], a);
            appliedCount++;
        } catch(e) {
            if (!window._applyWarnLogged) {
                console.warn('setDriveTarget failed for', dof.axis_name, ':', e.message);
                window._applyWarnLogged = true;
            }
        }
    }
    if (!window._applyLogged || window._applyLogCount < 5) {
        if (!window._applyLogCount) window._applyLogCount = 0;
        window._applyLogCount++;
        window._applyLogged = true;
        console.log('applyActions: applied', appliedCount, '/', humanoidData.dofInfo.length,
            'raw=[' + rawMin.toFixed(3) + ',' + rawMax.toFixed(3) + ']',
            'clipped=[' + clippedMin.toFixed(3) + ',' + clippedMax.toFixed(3) + ']',
            'hasBounds=' + (!!aLow && !!aHigh));
        console.log('  dofInfo[0]:', JSON.stringify(humanoidData.dofInfo[0]));
        console.log('  action[0:5]:', Array.from(action).slice(0,5).map(v=>v.toFixed(3)));
        // Read back the first target to verify
        try {
            const firstDof = humanoidData.dofInfo[0];
            const firstLink = bodyLinkMap[firstDof.child_body];
            const firstJoint = firstLink.getInboundJoint();
            const readBack = firstJoint.getDriveTarget(axisEnums[firstDof.physx_axis]);
            console.log('  readback target[0]:', readBack);
        } catch(e) { console.log('  readback failed:', e.message); }
    }
}

// ---------------------------------------------------------------------------
// Random latent vector (unit sphere)
// ---------------------------------------------------------------------------
function randomLatent() {
    latentVec = new Float32Array(humanoidData.latent_dim);
    let norm = 0;
    for (let i = 0; i < humanoidData.latent_dim; i++) {
        latentVec[i] = gaussianRandom();
        norm += latentVec[i] * latentVec[i];
    }
    norm = Math.sqrt(norm);
    if (norm > 0) {
        for (let i = 0; i < humanoidData.latent_dim; i++) latentVec[i] /= norm;
    }
}

// ---------------------------------------------------------------------------
// Reset
// ---------------------------------------------------------------------------
function resetHumanoid() {
    prevAction = null;  // Reset action smoothing
    pxScene.removeArticulation(articulation);
    // Rebuild mesh groups
    for (const entry of links) {
        if (entry.meshGroup) worldGroup.remove(entry.meshGroup);
    }
    links = [];
    buildArticulation();
    // Recreate meshes (all in Z-up, parented to worldGroup)
    for (let bi = 0; bi < humanoidData.bodies.length; bi++) {
        const body = humanoidData.bodies[bi];
        const group = new THREE.Group();
        const color = BODY_COLORS[body.name] || 0x888888;
        for (const geom of body.geoms) {
            const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.6, metalness: 0.2 });
            let mesh = null;
            if (geom.type === 'sphere') {
                mesh = new THREE.Mesh(new THREE.SphereGeometry(geom.radius, 16, 12), mat);
                const lp = geom.pos;
                mesh.position.set(lp[0], lp[1], lp[2]);
            } else if (geom.type === 'capsule' && geom.fromto) {
                const ft = geom.fromto;
                const p0 = new THREE.Vector3(ft[0], ft[1], ft[2]);
                const p1 = new THREE.Vector3(ft[3], ft[4], ft[5]);
                const dir = new THREE.Vector3().subVectors(p1, p0);
                const len = dir.length();
                mesh = new THREE.Mesh(new THREE.CapsuleGeometry(geom.radius, len, 8, 12), mat);
                mesh.position.addVectors(p0, p1).multiplyScalar(0.5);
                if (len > 0.001) mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
            } else if (geom.type === 'box') {
                const he = geom.halfExtents;
                mesh = new THREE.Mesh(new THREE.BoxGeometry(he[0]*2, he[1]*2, he[2]*2), mat);
                const lp = geom.pos;
                mesh.position.set(lp[0], lp[1], lp[2]);
            } else if (geom.type === 'cylinder') {
                const r = geom.radius;
                if (geom.fromto) {
                    const ft = geom.fromto;
                    const p0 = new THREE.Vector3(ft[0], ft[1], ft[2]);
                    const p1 = new THREE.Vector3(ft[3], ft[4], ft[5]);
                    const dir = new THREE.Vector3().subVectors(p1, p0);
                    const len = Math.max(dir.length(), 0.01);
                    mesh = new THREE.Mesh(new THREE.CylinderGeometry(r, r, len, 16), mat);
                    mesh.position.addVectors(p0, p1).multiplyScalar(0.5);
                    if (len > 0.001) mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
                } else {
                    const hh = geom.halfHeight || 0.015;
                    mesh = new THREE.Mesh(new THREE.CylinderGeometry(r, r, hh*2, 16), mat);
                    const lp = geom.pos || [0,0,0];
                    mesh.position.set(lp[0], lp[1], lp[2]);
                }
            }
            if (mesh) { mesh.castShadow = true; group.add(mesh); }
        }
        worldGroup.add(group);
        links[bi].meshGroup = group;
    }
    randomLatent();
}

// ---------------------------------------------------------------------------
// Main loop
// ---------------------------------------------------------------------------
let currentAction = null;
let resetGraceFrames = 60;  // grace period after reset before checking fall
const RESET_GRACE = 90;    // ~3 seconds of grace

// Simulation: one policy step per render frame, with numSubsteps physics substeps.
// Isaac Lab uses 30Hz policy / 120Hz physics (4 substeps).
// Web runs at browser frame rate (~20-60fps) with adjustable substeps.
async function mainLoop(timestamp) {
    if (!running) return;

    frameCount++;
    if (timestamp - lastFpsTime > 1000) {
        document.getElementById('fpsDisplay').textContent = `FPS: ${frameCount}`;
        frameCount = 0;
        lastFpsTime = timestamp;
    }

    // Run policy
    if (policyEnabled) {
        try {
            const obs = buildObservation();

            if (wsEnabled && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ obs: Array.from(obs), latent: Array.from(latentVec) }));
                if (wsAction) currentAction = new Float32Array(wsAction);
            } else {
                currentAction = await runPolicy(obs);
            }

            if (currentAction) applyActions(currentAction);
        } catch (e) {
            if (!window._policyErrCount) window._policyErrCount = 0;
            if (++window._policyErrCount <= 3) console.error('Policy error:', e.message);
            if (!currentAction) currentAction = new Float32Array(humanoidData.act_dim);
        }
    } else {
        applyActions(new Float32Array(humanoidData.init_dof_pos || humanoidData.act_dim));
    }

    // Step physics (numSubsteps × DT per control step)
    for (let i = 0; i < numSubsteps; i++) {
        pxScene.simulate(DT);
        pxScene.fetchResults(true);
    }
    if (restoreGroundAfterStep) { restoreGround(); restoreGroundAfterStep = false; }

    // Auto-reset if physics explodes
    try {
        const rz = links[0].link.getGlobalPose().get_p().get_z();
        if (resetGraceFrames > 0) resetGraceFrames--;
        else if (isNaN(rz) || Math.abs(rz) > 50) { resetHumanoid(); resetGraceFrames = RESET_GRACE; }
    } catch(e) {}

    // Camera tracking
    {
        const rp = links[0].link.getGlobalPose().get_p();
        controls.target.lerp(new THREE.Vector3(rp.get_x(), Math.max(rp.get_z(), 0.5), -rp.get_y()), 0.05);
    }

    updateMeshes();
    updateDebugInfo();
    controls.update();
    renderer.render(scene3d, camera);
    requestAnimationFrame(mainLoop);
}
