                        ' | velZ web=' + webVelZ.toFixed(3) + ' isaac=' + isaacVelZ.toFixed(3) + ' diff=' + velZDiff.toFixed(3) +
                        ' | maxDof=' + maxDofDiff.toFixed(4) + ' (' + worstDofName + ')' +
                        ' | obsErr=' + maxObsDiff.toFixed(4) + '@' + worstObsIdx);
                }
                console.log('=== STEP-BY-STEP REPLAY COMPLETE ===');
            }

            // 7. Random pose test: set fully random state with velocities
            console.log('\n=== RANDOM POSE TEST ===');
            const rpResp = await fetch('./random_pose_test.json?' + Date.now());
            const rpData = await rpResp.json();
            if (rpData && rpData.root_pos) {
                // Reset first
                resetHumanoid();
                const rpBodyLinkMap = {};
                for (const l of links) rpBodyLinkMap[l.name] = l.link;

                // Set root pose
                articulation.setRootGlobalPose(new PhysX.PxTransform(
                    new PhysX.PxVec3(rpData.root_pos[0], rpData.root_pos[1], rpData.root_pos[2]),
                    new PhysX.PxQuat(rpData.root_rot[0], rpData.root_rot[1], rpData.root_rot[2], rpData.root_rot[3])
                ), true);

                // Set root velocities
                articulation.setRootLinearVelocity(new PhysX.PxVec3(rpData.root_vel[0], rpData.root_vel[1], rpData.root_vel[2]));
                articulation.setRootAngularVelocity(new PhysX.PxVec3(rpData.root_ang_vel[0], rpData.root_ang_vel[1], rpData.root_ang_vel[2]));

                // Set DOF positions and velocities via per-joint API (common order via dofInfo)
                for (let i = 0; i < humanoidData.dofInfo.length; i++) {
                    const dof = humanoidData.dofInfo[i];
                    const childLink = rpBodyLinkMap[dof.child_body];
                    if (!childLink) continue;
                    try {
                        const joint = childLink.getInboundJoint();
                        joint.setJointPosition(axisEnums[dof.physx_axis], rpData.dof_pos[i]);
                        joint.setJointVelocity(axisEnums[dof.physx_axis], rpData.dof_vel[i]);
                    } catch(e) {}
                }

                // Propagate FK via cache copy+apply
                // Propagate FK (ground removed to prevent collision distortion)
                applyCacheNoGround();

                // Verify root velocity was set
                const rvCheck = links[0].link.getLinearVelocity();
                const ravCheck = links[0].link.getAngularVelocity();
                console.log('Root vel set: [' + rvCheck.get_x().toFixed(3) + ',' + rvCheck.get_y().toFixed(3) + ',' + rvCheck.get_z().toFixed(3) + ']' +
                    ' expected: [' + rpData.root_vel.map(v=>v.toFixed(3)).join(',') + ']');
                console.log('Root angvel set: [' + ravCheck.get_x().toFixed(3) + ',' + ravCheck.get_y().toFixed(3) + ',' + ravCheck.get_z().toFixed(3) + ']' +
                    ' expected: [' + rpData.root_ang_vel.map(v=>v.toFixed(3)).join(',') + ']');

                // Build obs
                const rpObs = buildObservation();
                const rpRef = rpData.obs;

                // Per-dim comparison
                const rpLabels = ['h'];
                for (let i = 0; i < 6; i++) rpLabels.push('rtn' + i);
                for (let i = 0; i < 3; i++) rpLabels.push('rv' + i);
                for (let i = 0; i < 3; i++) rpLabels.push('rav' + i);
                for (let j = 0; j < 16; j++) for (let k = 0; k < 6; k++) rpLabels.push('j' + j + 't' + k);
                for (let i = 0; i < 31; i++) rpLabels.push('dv' + i);
                for (let i = 0; i < 18; i++) rpLabels.push('kp' + i);

                const rpCats = [
                    ['height', 0, 1],
                    ['root_rot', 1, 7],
                    ['root_vel', 7, 10],
                    ['root_angvel', 10, 13],
                    ['joint_rot', 13, 109],
                    ['dof_vel', 109, 140],
                    ['key_pos', 140, 158]
                ];

                let rpSummary = '';
                const rpErrors = [];
                for (const [name, lo, hi] of rpCats) {
                    let maxE = 0, worstIdx = -1;
                    for (let i = lo; i < hi; i++) {
                        const d = Math.abs(rpObs[i] - rpRef[i]);
                        if (d > maxE) { maxE = d; worstIdx = i; }
                        if (d > 0.01) rpErrors.push({ idx: i, label: rpLabels[i] || ('d'+i), web: rpObs[i], ref: rpRef[i], err: d });
                    }
                    rpSummary += name + '=' + maxE.toFixed(4) + ' ';
                }

                console.log('RANDOM POSE per-category max err: ' + rpSummary);

                // Top errors
                rpErrors.sort((a, b) => b.err - a.err);
                for (const e of rpErrors.slice(0, 15)) {
                    console.log('  [' + e.idx + '] ' + e.label + ': web=' + e.web.toFixed(6) + ' ref=' + e.ref.toFixed(6) + ' err=' + e.err.toFixed(6));
                }

                // ONNX action comparison
                const rpZL = new Float32Array(humanoidData.latent_dim);
                const rpWR = await onnxSession.run({
                    obs: new ort.Tensor('float32', rpObs, [1, humanoidData.obs_dim]),
                    latent: new ort.Tensor('float32', rpZL, [1, humanoidData.latent_dim])
                });
                const rpWA = rpWR.action.data;
                let rpMaxAE = 0;
                for (let i = 0; i < rpWA.length; i++) rpMaxAE = Math.max(rpMaxAE, Math.abs(rpWA[i] - rpData.action[i]));
                console.log('RANDOM POSE action max err: ' + rpMaxAE.toFixed(6));

                // Per-body FK comparison if reference data available
                if (rpData.fk_body_pos && rpData.body_names) {
                    console.log('\n--- PER-BODY FK COMPARISON ---');
                    // Read DOF positions via per-joint API (common order)
                    const webDofPos = new Array(rpData.dof_pos.length);
                    for (let i = 0; i < humanoidData.dofInfo.length; i++) {
                        const dof = humanoidData.dofInfo[i];
                        const cl = rpBodyLinkMap[dof.child_body];
                        try {
                            webDofPos[i] = cl.getInboundJoint().getJointPosition(axisEnums[dof.physx_axis]);
                        } catch(e) { webDofPos[i] = 0; }
                    }

                    // Compare DOF positions (both in common order)
                    let maxDofErr = 0;
                    let worstDof = -1;
                    for (let i = 0; i < rpData.dof_pos.length; i++) {
                        const d = Math.abs(webDofPos[i] - rpData.dof_pos[i]);
                        if (d > maxDofErr) { maxDofErr = d; worstDof = i; }
                    }
                    console.log('DOF position max err: ' + maxDofErr.toFixed(6) + ' (dof ' + worstDof + ')');

                    // Compute FK in JS
                    const numBodies = humanoidData.fk_parent_indices.length;
                    const jsFkPos = new Array(numBodies);
                    const jsFkRot = new Array(numBodies);

                    // Get root from PhysX
                    const fkRootPose = links[0].link.getGlobalPose();
                    const fkRootP = fkRootPose.get_p();
                    const fkRootQ = fkRootPose.get_q();
                    jsFkPos[0] = [fkRootP.get_x(), fkRootP.get_y(), fkRootP.get_z()];
                    jsFkRot[0] = [fkRootQ.get_x(), fkRootQ.get_y(), fkRootQ.get_z(), fkRootQ.get_w()];

                    // Build joint quats from DOF positions (same as buildObservation)
                    const fkJointQuats = [];
                    for (const kj of humanoidData.kinematicJoints) {
                        let q;
                        if (kj.type === 'SPHERICAL') {
                            q = expMapToQuat(webDofPos[kj.dof_idx], webDofPos[kj.dof_idx+1], webDofPos[kj.dof_idx+2]);
                        } else if (kj.type === 'HINGE') {
                            q = axisAngleToQuat(kj.axis, webDofPos[kj.dof_idx]);
                        } else {
                            q = [0, 0, 0, 1];
                        }
                        fkJointQuats.push(q);
                    }

                    // Run FK
                    for (let j = 1; j < numBodies; j++) {
                        const jRot = fkJointQuats[j - 1];
                        const localTrans = humanoidData.fk_local_translations[j];
                        const localRot = humanoidData.fk_local_rotations[j];
                        const parentIdx = humanoidData.fk_parent_indices[j];
                        const parentPos = jsFkPos[parentIdx];
                        const parentRot = jsFkRot[parentIdx];
                        const worldTrans = quatRotateVec(parentRot, localTrans);
                        jsFkPos[j] = [parentPos[0]+worldTrans[0], parentPos[1]+worldTrans[1], parentPos[2]+worldTrans[2]];
                        const localCombined = quatMul(localRot, jRot);
                        jsFkRot[j] = quatMul(parentRot, localCombined);
                    }

                    // Compare each body
                    let maxBodyErr = 0;
                    let worstBody = '';
                    for (let b = 0; b < Math.min(numBodies, rpData.fk_body_pos.length); b++) {
                        const ref = rpData.fk_body_pos[b];
                        const web = jsFkPos[b];
                        const dx = Math.abs(web[0]-ref[0]), dy = Math.abs(web[1]-ref[1]), dz = Math.abs(web[2]-ref[2]);
                        const maxD = Math.max(dx, dy, dz);
                        const name = rpData.body_names[b] || ('body'+b);
                        if (maxD > 0.001) {
                            console.log('  ' + name + ': err=' + maxD.toFixed(4) +
                                ' web=[' + web.map(v=>v.toFixed(4)).join(',') + ']' +
                                ' ref=[' + ref.map(v=>v.toFixed(4)).join(',') + ']');
                        }
                        if (maxD > maxBodyErr) { maxBodyErr = maxD; worstBody = name; }
                    }
                    console.log('FK body max err: ' + maxBodyErr.toFixed(6) + ' (worst: ' + worstBody + ')');

                    // Also compare joint rotation quats if available
                    if (rpData.joint_rot_quats) {
                        console.log('\n--- JOINT ROTATION QUAT COMPARISON ---');
                        let maxJRE = 0;
                        let worstJoint = '';
                        for (let j = 0; j < fkJointQuats.length; j++) {
                            const wq = fkJointQuats[j];
                            const rq = rpData.joint_rot_quats[j];
                            // Compare quaternions (handle sign ambiguity)
                            let errPos = 0, errNeg = 0;
                            for (let k = 0; k < 4; k++) {
                                errPos = Math.max(errPos, Math.abs(wq[k] - rq[k]));
                                errNeg = Math.max(errNeg, Math.abs(wq[k] + rq[k]));
                            }
                            const err = Math.min(errPos, errNeg);
                            const jname = humanoidData.kinematicJoints[j]?.child_body || ('joint'+j);
                            if (err > 0.001) {
                                console.log('  ' + jname + ': err=' + err.toFixed(6) +
                                    ' web=[' + wq.map(v=>v.toFixed(4)).join(',') + ']' +
                                    ' ref=[' + rq.map(v=>v.toFixed(4)).join(',') + ']');
                            }
                            if (err > maxJRE) { maxJRE = err; worstJoint = jname; }
                        }
                        console.log('Joint rot quat max err: ' + maxJRE.toFixed(6) + ' (worst: ' + worstJoint + ')');
                    }
                }

                console.log('=== RANDOM POSE TEST COMPLETE ===');
            }

            // 8. Pose test cases: set specific poses and compare obs + action
            console.log('\n=== POSE TEST CASES ===');
            const ptResp = await fetch('./pose_tests.json?' + Date.now());
            const ptData = await ptResp.json();
            if (ptData && ptData.test_cases) {
                const axisE = [E_TWIST, E_SWING1, E_SWING2];
                for (const tc of ptData.test_cases) {
                    // Reset and set pose
                    resetHumanoid();
                    const blm = {};
                    for (const l of links) blm[l.name] = l.link;

                    // Set root pose
                    articulation.setRootGlobalPose(new PhysX.PxTransform(
                        new PhysX.PxVec3(tc.root_pos[0], tc.root_pos[1], tc.root_pos[2]),
                        new PhysX.PxQuat(tc.root_rot[0], tc.root_rot[1], tc.root_rot[2], tc.root_rot[3])
                    ), true);
                    // Zero velocities
                    articulation.setRootLinearVelocity(new PhysX.PxVec3(0, 0, 0));
                    articulation.setRootAngularVelocity(new PhysX.PxVec3(0, 0, 0));
                    // Set DOF positions
                    for (let i = 0; i < humanoidData.dofInfo.length; i++) {
                        const dof = humanoidData.dofInfo[i];
                        const cl = blm[dof.child_body];
                        if (cl) {
                            try {
                                cl.getInboundJoint().setJointPosition(axisE[dof.physx_axis], tc.dof_pos[i]);
                                cl.getInboundJoint().setJointVelocity(axisE[dof.physx_axis], 0);
                            } catch(e) {}
                        }
                    }
                    // Propagate FK
                    applyCacheNoGround();

                    // Build obs
                    const webObs = buildObservation();
                    const refObs = tc.obs;

                    // Compare per-category
                    const cats = [
                        ['height', 0, 1],
                        ['rot_tn', 1, 7],
                        ['vel', 7, 10],
                        ['angvel', 10, 13],
                        ['jrot', 13, 109],
                        ['dofvel', 109, 140],
                        ['keypos', 140, 158]
                    ];
                    let summary = tc.name + ': ';
                    for (const [name, lo, hi] of cats) {
                        let maxE = 0;
                        for (let i = lo; i < hi; i++) {
                            maxE = Math.max(maxE, Math.abs(webObs[i] - refObs[i]));
                        }
                        if (maxE > 0.01) summary += name + '=' + maxE.toFixed(3) + ' ';
                    }

                    // Run ONNX
                    const zl = new Float32Array(humanoidData.latent_dim);
                    const webR = await onnxSession.run({
                        obs: new ort.Tensor('float32', webObs, [1, humanoidData.obs_dim]),
                        latent: new ort.Tensor('float32', zl, [1, humanoidData.latent_dim])
                    });
                    const webAct = webR.action.data;
                    let maxAE = 0;
                    for (let i = 0; i < webAct.length; i++) {
                        maxAE = Math.max(maxAE, Math.abs(webAct[i] - tc.action[i]));
                    }
                    summary += '| actErr=' + maxAE.toFixed(4);

                    console.log('POSE ' + summary);
                }
                console.log('=== POSE TESTS COMPLETE ===');
            }

            // 8. Closed-loop comparison: run ONNX from init_pose, compare step by step
            console.log('\n=== CLOSED-LOOP COMPARISON ===');
            const clResp = await fetch('./closedloop_trace.json?' + Date.now());
            const clTrace = await clResp.json();
            if (clTrace && clTrace.steps) {
                // Reset to init_pose
                resetHumanoid();
                const clBodyMap = {};
                for (const l of links) clBodyMap[l.name] = l.link;

                const zeroLatent = new Float32Array(humanoidData.latent_dim);
                for (let step = 0; step < clTrace.steps.length; step++) {
                    const ref = clTrace.steps[step];

                    // Build web observation
                    const webObs = buildObservation();
                    const refObs = ref.obs;

                    // Compare obs
                    let maxObsDiff = 0, worstObsIdx = -1;
                    for (let i = 0; i < Math.min(webObs.length, refObs.length); i++) {
                        const d = Math.abs(webObs[i] - refObs[i]);
                        if (d > maxObsDiff) { maxObsDiff = d; worstObsIdx = i; }
                    }

                    // Run ONNX on web obs
                    const webObsTensor = new ort.Tensor('float32', webObs, [1, humanoidData.obs_dim]);
                    const latTensor = new ort.Tensor('float32', zeroLatent, [1, humanoidData.latent_dim]);
                    const webResult = await onnxSession.run({ obs: webObsTensor, latent: latTensor });
                    const webAction = webResult.action.data;

                    // Compare action
                    let maxActDiff = 0;
                    for (let i = 0; i < Math.min(webAction.length, ref.action.length); i++) {
                        const d = Math.abs(webAction[i] - ref.action[i]);
                        if (d > maxActDiff) maxActDiff = d;
                    }

                    // Compare DOF positions
                    let maxDofDiff = 0, worstDof = '';
                    for (let i = 0; i < humanoidData.dofInfo.length; i++) {
                        const dof = humanoidData.dofInfo[i];
                        const cl = clBodyMap[dof.child_body];
                        if (!cl) continue;
                        try {
                            const webVal = cl.getInboundJoint().getJointPosition(axisEnums[dof.physx_axis]);
                            const d = Math.abs(webVal - ref.state.dof_pos[i]);
                            if (d > maxDofDiff) { maxDofDiff = d; worstDof = dof.child_body + '/' + dof.axis_name; }
                        } catch(e) {}
                    }

                    const webRZ = links[0].link.getGlobalPose().get_p().get_z();
                    const refRZ = ref.state.root_pos[2];

                    console.log('CL Step ' + step + ': rootZ web=' + webRZ.toFixed(4) + ' isaac=' + refRZ.toFixed(4) + ' diff=' + Math.abs(webRZ - refRZ).toFixed(4) +
                        ' | obsErr=' + maxObsDiff.toFixed(4) + '@' + worstObsIdx +
                        ' | actErr=' + maxActDiff.toFixed(4) +
                        ' | dofErr=' + maxDofDiff.toFixed(4) + ' (' + worstDof + ')');

                    // Apply ONNX action (same as web would)
                    applyActions(new Float32Array(ref.action));

                    // Step physics
                    for (let i = 0; i < 4; i++) {
                        pxScene.simulate(DT);
                        pxScene.fetchResults(true);
                    }
                }
                console.log('=== CLOSED-LOOP COMPARISON COMPLETE ===');
            }

            // OBS TRACE TEST: compute obs from Isaac Lab states purely in JS
            console.log('\n=== OBS TRACE TEST (JS obs from Isaac Lab states) ===');
            try {
                const otResp = await fetch('./obs_trace.json?' + Date.now());
                const otData = await otResp.json();
                if (otData && otData.length > 0) {
                    let maxErrAll = 0, worstStep = -1, worstIdx = -1;
                    const catRanges = [
                        ['height', 0, 1],
                        ['root_rot', 1, 7],
                        ['root_vel', 7, 10],
                        ['root_angvel', 10, 13],
                        ['joint_rot', 13, 109],
                        ['dof_vel', 109, 140],
                        ['key_pos', 140, 158],
                    ];
                    for (const frame of otData) {
                        const jsObs = buildObservationFromState(frame);
                        const pyObs = frame.obs;

                        // Per-category errors
                        let stepSummary = 'Step ' + frame.step + ':';
                        let stepMaxErr = 0, stepWorstIdx = -1;
                        for (const [name, lo, hi] of catRanges) {
                            let catMax = 0;
                            for (let i = lo; i < Math.min(hi, pyObs.length); i++) {
                                const d = Math.abs(jsObs[i] - pyObs[i]);
                                if (d > catMax) catMax = d;
                                if (d > stepMaxErr) { stepMaxErr = d; stepWorstIdx = i; }
                            }
                            stepSummary += ' ' + name + '=' + catMax.toFixed(4);
                        }

                        if (stepMaxErr > maxErrAll) {
                            maxErrAll = stepMaxErr;
                            worstStep = frame.step;
                            worstIdx = stepWorstIdx;
                        }

                        // Log every step if error > 0.01, or first/last
                        if (stepMaxErr > 0.01 || frame.step === 0 || frame.step === otData.length - 1) {
                            console.log(stepSummary + ' | worst=' + stepMaxErr.toFixed(4) + '@' + stepWorstIdx);
                        }

                        // Detailed per-dim log for first frame with large error
                        if (stepMaxErr > 0.01 && frame.step <= 5) {
                            for (let i = 0; i < Math.min(jsObs.length, pyObs.length); i++) {
                                const d = Math.abs(jsObs[i] - pyObs[i]);
                                if (d > 0.01) {
                                    console.log('  [' + i + '] js=' + jsObs[i].toFixed(6) + ' py=' + pyObs[i].toFixed(6) + ' err=' + d.toFixed(6));
                                }
                            }
                        }
                    }
                    console.log('OBS TRACE SUMMARY: max_err=' + maxErrAll.toFixed(6) + ' at step ' + worstStep + ' idx ' + worstIdx);
                    if (maxErrAll < 0.001) {
                        console.log('>>> JS obs computation MATCHES Python for all dynamic states <<<');
                    } else {
                        console.log('>>> JS obs DIVERGES from Python — max error ' + maxErrAll.toFixed(4) + ' <<<');
                    }
                }
            } catch(e) {
                console.log('OBS TRACE TEST skipped: ' + e.message);
            }

            console.log('\n=== AUDIT COMPLETE ===');
            running = true;
            requestAnimationFrame(mainLoop);
        });

        // Playback Isaac Lab trace — step through frames visually
        document.getElementById('btnPlayTrace')?.addEventListener('click', async () => {
            running = false;
            console.log('=== PLAYBACK: Loading obs trace ===');
            let traceFrames;
            try {
                const resp = await fetch('./obs_trace.json?' + Date.now());
                traceFrames = await resp.json();
            } catch(e) {
                console.error('Failed to load obs_trace.json:', e.message);
                running = true; requestAnimationFrame(mainLoop); return;
            }
            if (!traceFrames || traceFrames.length === 0) {
                console.error('obs_trace.json is empty');
                running = true; requestAnimationFrame(mainLoop); return;
            }

            console.log('Loaded ' + traceFrames.length + ' frames. Playing back...');
            const axisE = [E_TWIST, E_SWING1, E_SWING2];
            const blm = {};
            for (const l of links) blm[l.name] = l.link;

            // === T-POSE DIAGNOSTIC: set all DOFs to 0, check link positions ===
            {
                removeGround();
                const tposeZ = humanoidData.tpose_pelvis_z || 0.903;
                articulation.setRootGlobalPose(new PhysX.PxTransform(
                    new PhysX.PxVec3(0, 0, tposeZ),
                    new PhysX.PxQuat(0, 0, 0, 1)  // identity rotation
                ), true);
                // Set ALL DOFs to 0
                for (let i = 0; i < humanoidData.dofInfo.length; i++) {
                    const dof = humanoidData.dofInfo[i];
                    const cl = blm[dof.child_body];
                    if (!cl) continue;
                    try {
                        const joint = cl.getInboundJoint();
                        joint.setJointPosition(axisE[dof.physx_axis], 0);
                    } catch(e) {}
                }
                // Propagate FK
                {
                    const flags = new PhysX.PxArticulationCacheFlags(PhysX.PxArticulationCacheFlagEnum.eALL);
                    const cache = articulation.createCache();
                    articulation.copyInternalStateToCache(cache, flags);
                    articulation.applyCache(cache, flags, true);
                }
                // Check link positions against T-pose body.pos + tposeZ
                console.log('=== T-POSE TEST (all DOFs=0, root=[0,0,' + tposeZ + ']) ===');
                let tposeMaxErr = 0;
                let tposeMaxBody = '';
                for (let b = 0; b < links.length; b++) {
                    const lp = links[b].link.getGlobalPose();
                    const px = lp.get_p();
                    const webPos = [px.get_x(), px.get_y(), px.get_z()];
                    const bp = humanoidData.bodies[b].pos;
                    const expected = [bp[0], bp[1], bp[2] + tposeZ];
                    const dx = webPos[0]-expected[0], dy = webPos[1]-expected[1], dz = webPos[2]-expected[2];
                    const err = Math.sqrt(dx*dx + dy*dy + dz*dz);
                    if (err > 0.001) {
                        console.log('  T-POSE ' + links[b].name + ': web=[' + webPos.map(v=>v.toFixed(4)).join(',') +
                            '] expected=[' + expected.map(v=>v.toFixed(4)).join(',') + '] err=' + err.toFixed(4));
                    }
                    if (err > tposeMaxErr) { tposeMaxErr = err; tposeMaxBody = links[b].name; }
                }
                console.log('T-POSE max_err=' + tposeMaxErr.toFixed(4) + ' (' + tposeMaxBody + ')');
                restoreGround();
            }

            let frameIdx = 0;
            const playFrame = () => {
                if (frameIdx >= traceFrames.length) {
                    // Loop back
                    frameIdx = 0;
                }
                const f = traceFrames[frameIdx];

                // Remove ground during entire state-setting to prevent collision
                removeGround();

                // Set root pose
                articulation.setRootGlobalPose(new PhysX.PxTransform(
                    new PhysX.PxVec3(f.root_pos[0], f.root_pos[1], f.root_pos[2]),
                    new PhysX.PxQuat(f.root_rot[0], f.root_rot[1], f.root_rot[2], f.root_rot[3])
                ), true);

                // Set DOF positions via per-joint API
                for (let i = 0; i < humanoidData.dofInfo.length; i++) {
                    const dof = humanoidData.dofInfo[i];
                    const cl = blm[dof.child_body];
                    if (!cl) continue;
                    try {
                        const joint = cl.getInboundJoint();
                        joint.setJointPosition(axisE[dof.physx_axis], f.dof_pos[i]);
                    } catch(e) {}
                }

                // Frame 0: verify hip DOF readback
                if (frameIdx === 0) {
                    const hipLink = blm['right_thigh'];
                    if (hipLink) {
                        const hj = hipLink.getInboundJoint();
                        const tw = hj.getJointPosition(axisE[0]);
                        const s1 = hj.getJointPosition(axisE[1]);
                        const s2 = hj.getJointPosition(axisE[2]);
                        console.log('RIGHT HIP DOFs: TWIST=' + tw.toFixed(4) + ' SWING1=' + s1.toFixed(4) + ' SWING2=' + s2.toFixed(4));
                        // Thigh ROTATION from PhysX (critical comparison with knee_test)
                        const tgp = hipLink.getGlobalPose();
                        const tq = tgp.get_q();
                        console.log('RIGHT THIGH rot(xyzw): [' + tq.get_x().toFixed(4) + ',' + tq.get_y().toFixed(4) + ',' + tq.get_z().toFixed(4) + ',' + tq.get_w().toFixed(4) + ']');
                        console.log('  knee_test thigh rot:  [-0.1703, 0.0912,-0.9057, 0.3772]');
                    }
                    const kneeLink = blm['right_shin'];
                    if (kneeLink) {
                        const kj = kneeLink.getInboundJoint();
                        const kt = kj.getJointPosition(axisE[0]);
                        const kneeDof = humanoidData.dofInfo.find(d => d.joint_name === 'right_knee');
                        const ki = humanoidData.dofInfo.indexOf(kneeDof);
                        console.log('RIGHT KNEE readback: TWIST=' + kt.toFixed(4) + ' set_value=' + f.dof_pos[ki].toFixed(4));
                    }
                }

                // Propagate FK: try updateKinematics first, fall back to cache
                if (typeof articulation.updateKinematics === 'function') {
                    articulation.updateKinematics();
                    if (frameIdx === 0) console.log('Using updateKinematics() for FK propagation');
                } else {
                    // Fall back to cache approach
                    const flags = new PhysX.PxArticulationCacheFlags(PhysX.PxArticulationCacheFlagEnum.eALL);
                    const cache = articulation.createCache();
                    articulation.copyInternalStateToCache(cache, flags);
                    articulation.applyCache(cache, flags, true);
                    if (frameIdx === 0) console.log('Using copyInternalState+applyCache for FK propagation');
                }

                // POST-CACHE readback: check if cache changed our DOF values
                if (frameIdx === 0) {
                    const hipLink2 = blm['right_thigh'];
                    if (hipLink2) {
                        const hj2 = hipLink2.getInboundJoint();
                        const tw2 = hj2.getJointPosition(axisE[0]);
                        const s12 = hj2.getJointPosition(axisE[1]);
                        const s22 = hj2.getJointPosition(axisE[2]);
                        console.log('POST-CACHE hip DOFs: TWIST=' + tw2.toFixed(4) + ' SWING1=' + s12.toFixed(4) + ' SWING2=' + s22.toFixed(4));
                        const tgp2 = hipLink2.getGlobalPose();
                        const tq2 = tgp2.get_q();
                        console.log('POST-CACHE thigh rot: [' + tq2.get_x().toFixed(4) + ',' + tq2.get_y().toFixed(4) + ',' + tq2.get_z().toFixed(4) + ',' + tq2.get_w().toFixed(4) + ']');
                    }
                }

                restoreGround();

                // Update meshes from PhysX link positions
                updateMeshes();

                // Also compute JS obs from this state and broadcast to visualizer
                const jsObs = buildObservationFromState(f);
                try { localStorage.setItem('mimickit-obs', JSON.stringify(Array.from(jsObs))); } catch(e) {}
                // Also store the Python reference obs
                try { localStorage.setItem('mimickit-ref-obs', JSON.stringify(f.obs)); } catch(e) {}

                // Update HUD
                const hud = document.getElementById('debugInfo');
                if (hud) {
                    hud.innerHTML = 'PLAYBACK frame ' + frameIdx + '/' + traceFrames.length +
                        '<br>root_z: ' + f.root_pos[2].toFixed(3) +
                        '<br>action[0:3]: ' + f.action.slice(0,3).map(v=>v.toFixed(3)).join(', ');
                }

                // Verify action: feed JS obs + trace latent into ONNX, compare to Isaac Lab action
                const traceLatent = f.latent ? new Float32Array(f.latent) : new Float32Array(humanoidData.latent_dim || 64);
                const obsTensor = new ort.Tensor('float32', jsObs, [1, humanoidData.obs_dim]);
                const latTensor = new ort.Tensor('float32', traceLatent, [1, humanoidData.latent_dim || 64]);
                let feed = { obs: obsTensor };
                if (humanoidData.latent_dim > 0) feed.latent = latTensor;
                onnxSession.run(feed).then(result => {
                    const webAction = result.action.data;
                    const pyAction = f.action;
                    let maxActErr = 0;
                    for (let i = 0; i < Math.min(webAction.length, pyAction.length); i++) {
                        maxActErr = Math.max(maxActErr, Math.abs(webAction[i] - pyAction[i]));
                    }
                    console.log('Frame ' + (frameIdx-1) + ': root_z=' + f.root_pos[2].toFixed(4) +
                        ' obs_err=0.000000' +
                        ' act_err=' + maxActErr.toFixed(6) +
                        (maxActErr > 0.01 ? ' *** ACTION MISMATCH ***' : ''));
                });

                // Compare world-space body positions: PhysX links vs Isaac Lab
                if (f.body_pos) {
                    const bodyNames = humanoidData.bodies.map(b => b.name);
                    let maxBpErr = 0, worstBody = '';
                    const details = [];
                    for (let bi = 0; bi < links.length; bi++) {
                        const lp = links[bi].link.getGlobalPose().get_p();
                        const webPos = [lp.get_x(), lp.get_y(), lp.get_z()];
                        const isaacPos = f.body_pos[bi];
                        if (!isaacPos) continue;
                        const dx = Math.abs(webPos[0] - isaacPos[0]);
                        const dy = Math.abs(webPos[1] - isaacPos[1]);
                        const dz = Math.abs(webPos[2] - isaacPos[2]);
                        const d = Math.max(dx, dy, dz);
                        if (d > maxBpErr) { maxBpErr = d; worstBody = links[bi].name; }
                        if (d > 0.01) {
                            details.push(links[bi].name + ':' +
                                ' web=[' + webPos.map(v=>v.toFixed(4)).join(',') + ']' +
                                ' isaac=[' + isaacPos.map(v=>v.toFixed(4)).join(',') + ']' +
                                ' err=' + d.toFixed(4));
                        }
                    }
                    if (frameIdx <= 3 || maxBpErr > 0.05) {
                        console.log('Frame ' + (frameIdx-1) + ' BODY POS max_err=' + maxBpErr.toFixed(4) + ' (' + worstBody + ')');
                        for (const det of details.slice(0, 5)) {
                            console.log('  ' + det);
                        }
                    }
                }

                // Log first frame details
                if (frameIdx === 0) {
                    console.log('Frame 0: root_pos=' + f.root_pos.map(v=>v.toFixed(4)) +
                        ' root_rot=' + f.root_rot.map(v=>v.toFixed(4)) +
                        ' dof[0:3]=' + f.dof_pos.slice(0,3).map(v=>v.toFixed(4)));
                }

                frameIdx++;

                // Render
                renderer.render(scene3d, camera);

                // Schedule next frame at ~10fps (100ms per frame = slow enough to inspect)
                if (!running) {
                    setTimeout(playFrame, 100);
                }
            };

            playFrame();
        });

        document.getElementById('chkDrives').addEventListener('change', (e) => {
            drivesEnabled = e.target.checked;
            applyDriveParams();
        });
        document.getElementById('chkPolicy').addEventListener('change', (e) => {
            policyEnabled = e.target.checked;
        });
        document.getElementById('chkSelfCollision').addEventListener('change', (e) => {
            setSelfCollision(e.target.checked);
        });
        document.getElementById('chkGravity').addEventListener('change', (e) => {
            setGravity(e.target.checked);
        });
        document.getElementById('chkWSInference').addEventListener('change', (e) => {
            wsEnabled = e.target.checked;
            if (wsEnabled && !ws) {
                ws = new WebSocket('ws://localhost:8765');
                ws.onopen = () => {
                    console.log('WebSocket connected to localhost:8765');
                };
                ws.onmessage = (evt) => {
                    const data = JSON.parse(evt.data);
                    wsAction = data.pytorch_action;
                    wsMaxDiff = data.max_diff;
                    console.log('WS max_diff pytorch vs onnx:', data.max_diff);
                };
                ws.onerror = (err) => {
                    console.error('WebSocket error:', err);
                };
                ws.onclose = () => {
                    console.log('WebSocket disconnected');
                    ws = null;
                    wsAction = null;
                };
            }
            if (!wsEnabled) {
                wsMaxDiff = null;
            }
        });
        document.getElementById('sliderGravity').addEventListener('input', (e) => {
            const g = parseFloat(e.target.value);
            document.getElementById('gravityVal').textContent = g.toFixed(2);
            pxScene.setGravity(new PhysX.PxVec3(0, 0, g));
        });
        document.getElementById('sliderSubsteps').addEventListener('input', (e) => {
            numSubsteps = parseInt(e.target.value);
            document.getElementById('substepsVal').textContent = numSubsteps;
        });

        // Collapsible debug panel
        document.getElementById('debugToggle').addEventListener('click', () => {
            const content = document.getElementById('debugContent');
            const arrow = document.getElementById('debugArrow');
            if (content.style.display === 'none') {
                content.style.display = '';
                arrow.innerHTML = '&#9660;';
            } else {
                content.style.display = 'none';
                arrow.innerHTML = '&#9654;';
            }
        });

        running = true;
        lastFpsTime = performance.now();
        requestAnimationFrame(mainLoop);
        console.log('Demo running!');
    } catch (err) {
        setStatus('Error: ' + err.message);
        console.error(err);
    }
}

init();
</script>
</body>
</html>
