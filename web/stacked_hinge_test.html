<!DOCTYPE html>
<html>
<head>
<title>Stacked Hinge Test - Replace Spherical with 3 Revolute Joints</title>
<style>
body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
pre { background: #0d0d1a; padding: 10px; border-radius: 4px; overflow-x: auto; }
.pass { color: #4caf50; } .fail { color: #ff5252; } .warn { color: #ffeb3b; }
h2 { color: #7c7cff; }
</style>
</head>
<body>
<h1>Stacked Hinge Test</h1>
<p>Replace spherical hip joint with 3 stacked revolute joints. Test all 6 axis orderings.</p>
<pre id="log">Loading PhysX WASM...</pre>

<script type="module">
const log = document.getElementById('log');
function L(msg, cls) {
    const span = document.createElement('span');
    span.className = cls || '';
    span.textContent = msg + '\n';
    log.appendChild(span);
}

function dist(a, b) {
    const d = [a[0]-b[0], a[1]-b[1], a[2]-b[2]];
    return Math.sqrt(d[0]*d[0]+d[1]*d[1]+d[2]*d[2]);
}

const module = await import('https://cdn.jsdelivr.net/npm/physx-js-webidl@2.7.2/physx-js-webidl.mjs');
const PhysX = await module.default({
    locateFile: () => 'https://cdn.jsdelivr.net/npm/physx-js-webidl@2.7.2/physx-js-webidl.wasm'
});

log.textContent = '';
L('PhysX WASM loaded');

const tlf = PhysX.PxTopLevelFunctions.prototype;
const version = PhysX.PHYSICS_VERSION;
const foundation = tlf.CreateFoundation(version, new PhysX.PxDefaultAllocator(), new PhysX.PxDefaultErrorCallback());
const tolerances = new PhysX.PxTolerancesScale();
const physics = tlf.CreatePhysics(version, foundation, tolerances);

const sceneDesc = new PhysX.PxSceneDesc(tolerances);
sceneDesc.set_gravity(new PhysX.PxVec3(0, 0, 0));
sceneDesc.set_cpuDispatcher(tlf.DefaultCpuDispatcherCreate(0));
sceneDesc.set_filterShader(tlf.DefaultFilterShader());
sceneDesc.set_solverType(PhysX.PxSolverTypeEnum.eTGS);
const scene = physics.createScene(sceneDesc);

const E_TWIST = PhysX.PxArticulationAxisEnum.eTWIST;
const E_SWING1 = PhysX.PxArticulationAxisEnum.eSWING1;
const E_SWING2 = PhysX.PxArticulationAxisEnum.eSWING2;
const E_SPHERICAL = PhysX.PxArticulationJointTypeEnum.eSPHERICAL;
const E_REVOLUTE = PhysX.PxArticulationJointTypeEnum.eREVOLUTE;
const E_FIX = PhysX.PxArticulationJointTypeEnum.eFIX;
const E_LIMITED = PhysX.PxArticulationMotionEnum.eLIMITED;
const E_LOCKED = PhysX.PxArticulationMotionEnum.eLOCKED;
const shapeFlags = new PhysX.PxShapeFlags(
    PhysX.PxShapeFlagEnum.eSCENE_QUERY_SHAPE | PhysX.PxShapeFlagEnum.eSIMULATION_SHAPE
);
const material = physics.createMaterial(1.0, 1.0, 0.0);

// Trace data from Isaac Lab frame 0
const traceRoot = { pos: [-0.0310, 0.7890, 0.7972], rot: [0.0593, 0.1507, -0.7036, 0.6919] };
// Hip DOFs in dofInfo order: hip_x (twist), hip_z (swing2), hip_y (swing1)
// PhysX axes: hip_x→TWIST(X), hip_z→SWING2(Z), hip_y→SWING1(Y)
const hipDofX = -0.14048; // hip_x / twist
const hipDofY = -0.34596; // hip_y / swing1
const hipDofZ = -0.81146; // hip_z / swing2
const traceKnee = 1.01240;

// Isaac Lab reference positions
const isaacThighPos = [-0.11519, 0.78877, 0.80822];
const isaacShinPos = [-0.26758, 0.59711, 0.46508];
const isaacFootPos = [-0.28437, 0.78464, 0.10101];

// Load humanoid data for knee localRot
const resp = await fetch('./humanoid_data.json');
const humanoidData = await resp.json();

// Axes and their DOF values
const axes = [
    { name: 'X', axis: [1, 0, 0], dof: hipDofX },
    { name: 'Y', axis: [0, 1, 0], dof: hipDofY },
    { name: 'Z', axis: [0, 0, 1], dof: hipDofZ },
];

// All 6 permutations
const permutations = [
    [0, 1, 2], // XYZ
    [0, 2, 1], // XZY
    [1, 0, 2], // YXZ
    [1, 2, 0], // YZX
    [2, 0, 1], // ZXY
    [2, 1, 0], // ZYX
];

// Knee joint localRot from humanoid_data.json
const kneeLR = [0.7071067811865476, 0, 0, 0.7071067811865475]; // wxyz

// Helper: compute_joint_frame for a single hinge axis (same as export_humanoid_json.py)
function getRotationQuat(from, to) {
    const fl = Math.sqrt(from[0]**2+from[1]**2+from[2]**2);
    const tl = Math.sqrt(to[0]**2+to[1]**2+to[2]**2);
    const u = [from[0]/fl, from[1]/fl, from[2]/fl];
    const v = [to[0]/tl, to[1]/tl, to[2]/tl];
    const d = u[0]*v[0]+u[1]*v[1]+u[2]*v[2];
    if (d > 1.0 - 1e-6) return [0,0,0,1]; // identity (xyzw)
    const c = [u[1]*v[2]-u[2]*v[1], u[2]*v[0]-u[0]*v[2], u[0]*v[1]-u[1]*v[0]];
    const s = Math.sqrt((1+d)*2);
    const invs = 1/s;
    const q = [c[0]*invs, c[1]*invs, c[2]*invs, 0.5*s];
    const n = Math.sqrt(q[0]**2+q[1]**2+q[2]**2+q[3]**2);
    return [q[0]/n, q[1]/n, q[2]/n, q[3]/n]; // xyzw
}

let bestPerm = null;
let bestErr = Infinity;

for (const perm of permutations) {
    const permName = perm.map(i => axes[i].name).join('→');
    L('\n=== Stacked ' + permName + ' ===');

    const artic = physics.createArticulationReducedCoordinate();
    artic.setSolverIterationCounts(4, 0);

    // Pelvis (root)
    const pelvis = artic.createLink(null, new PhysX.PxTransform(
        new PhysX.PxVec3(0, 0, 0.903), new PhysX.PxQuat(0,0,0,1)));
    const sg = new PhysX.PxSphereGeometry(0.09);
    pelvis.attachShape(physics.createShape(sg, material, true, shapeFlags));
    PhysX.PxRigidBodyExt.prototype.setMassAndUpdateInertia(pelvis, 10);

    // Hip offset
    const hipOff = [0, -0.084887, 0];

    // Create 3 stacked revolute joints for the hip
    // Each intermediate link is at the hip location
    let parentLink = pelvis;
    const hingeJoints = [];
    const hingeLinks = [];

    for (let si = 0; si < 3; si++) {
        const ai = perm[si];
        const ax = axes[ai];
        const isLast = (si === 2);

        // Create link at the hip position (all 3 hinges are at the same point)
        const linkPose = new PhysX.PxTransform(
            new PhysX.PxVec3(hipOff[0], hipOff[1], 0.903 + hipOff[2]),
            new PhysX.PxQuat(0,0,0,1));
        const link = artic.createLink(parentLink, linkPose);

        // Give intermediate links tiny mass; give the last one (thigh) real mass
        const linkGeo = new PhysX.PxSphereGeometry(isLast ? 0.055 : 0.001);
        link.attachShape(physics.createShape(linkGeo, material, true, shapeFlags));
        PhysX.PxRigidBodyExt.prototype.setMassAndUpdateInertia(link, isLast ? 5 : 0.001);

        // Set up revolute joint
        const joint = link.getInboundJoint();
        joint.setJointType(E_REVOLUTE);

        // localRot: rotate PhysX X (twist) to the hinge axis
        const lr = getRotationQuat([1,0,0], ax.axis); // xyzw

        // Parent pose: offset only for the first joint, zero for subsequent
        const parentOff = (si === 0) ? hipOff : [0, 0, 0];
        joint.setParentPose(new PhysX.PxTransform(
            new PhysX.PxVec3(parentOff[0], parentOff[1], parentOff[2]),
            new PhysX.PxQuat(lr[0], lr[1], lr[2], lr[3])));
        joint.setChildPose(new PhysX.PxTransform(
            new PhysX.PxVec3(0, 0, 0),
            new PhysX.PxQuat(lr[0], lr[1], lr[2], lr[3])));

        joint.setMotion(E_TWIST, E_LIMITED);
        joint.setLimitParams(E_TWIST, new PhysX.PxArticulationLimit(-3.14, 3.14));
        joint.setMotion(E_SWING1, E_LOCKED);
        joint.setMotion(E_SWING2, E_LOCKED);

        hingeJoints.push({ joint, dofValue: ax.dof, axisName: ax.name });
        hingeLinks.push(link);
        parentLink = link;
    }

    const thighLink = hingeLinks[2]; // Last link is the thigh

    // Shin (child of thigh, revolute knee joint)
    const shin = artic.createLink(thighLink, new PhysX.PxTransform(
        new PhysX.PxVec3(hipOff[0], hipOff[1], 0.903 - 0.421546),
        new PhysX.PxQuat(0,0,0,1)));
    shin.attachShape(physics.createShape(new PhysX.PxCapsuleGeometry(0.05, 0.2), material, true, shapeFlags));
    PhysX.PxRigidBodyExt.prototype.setMassAndUpdateInertia(shin, 3);

    const kneeJoint = shin.getInboundJoint();
    kneeJoint.setJointType(E_REVOLUTE);
    kneeJoint.setParentPose(new PhysX.PxTransform(
        new PhysX.PxVec3(0, 0, -0.421546),
        new PhysX.PxQuat(kneeLR[1], kneeLR[2], kneeLR[3], kneeLR[0]))); // wxyz→xyzw
    kneeJoint.setChildPose(new PhysX.PxTransform(
        new PhysX.PxVec3(0, 0, 0),
        new PhysX.PxQuat(kneeLR[1], kneeLR[2], kneeLR[3], kneeLR[0])));
    kneeJoint.setMotion(E_TWIST, E_LIMITED);
    kneeJoint.setLimitParams(E_TWIST, new PhysX.PxArticulationLimit(-3.14, 3.14));
    kneeJoint.setMotion(E_SWING1, E_LOCKED);
    kneeJoint.setMotion(E_SWING2, E_LOCKED);

    // Foot (child of shin)
    const foot = artic.createLink(shin, new PhysX.PxTransform(
        new PhysX.PxVec3(hipOff[0], hipOff[1], 0.903 - 0.421546 - 0.40987),
        new PhysX.PxQuat(0,0,0,1)));
    foot.attachShape(physics.createShape(new PhysX.PxBoxGeometry(0.09, 0.045, 0.03), material, true, shapeFlags));
    PhysX.PxRigidBodyExt.prototype.setMassAndUpdateInertia(foot, 1);

    const ankleJoint = foot.getInboundJoint();
    ankleJoint.setJointType(E_FIX);  // Lock ankle for simplicity
    ankleJoint.setParentPose(new PhysX.PxTransform(
        new PhysX.PxVec3(0, 0, -0.40987), new PhysX.PxQuat(0,0,0,1)));
    ankleJoint.setChildPose(new PhysX.PxTransform(
        new PhysX.PxVec3(0, 0, 0), new PhysX.PxQuat(0,0,0,1)));

    scene.addArticulation(artic);

    // Set state
    const rp = traceRoot.pos, rr = traceRoot.rot;
    artic.setRootGlobalPose(new PhysX.PxTransform(
        new PhysX.PxVec3(rp[0], rp[1], rp[2]),
        new PhysX.PxQuat(rr[0], rr[1], rr[2], rr[3])), true);

    // Set hip DOFs
    for (const hj of hingeJoints) {
        hj.joint.setJointPosition(E_TWIST, hj.dofValue);
    }
    kneeJoint.setJointPosition(E_TWIST, traceKnee);

    // Apply cache
    const flags = new PhysX.PxArticulationCacheFlags(PhysX.PxArticulationCacheFlagEnum.eALL);
    const cache = artic.createCache();
    artic.copyInternalStateToCache(cache, flags);
    artic.applyCache(cache, flags, true);

    // Read positions
    const thighGP = thighLink.getGlobalPose();
    const tp = thighGP.get_p();
    const tq = thighGP.get_q();
    const webThigh = [tp.get_x(), tp.get_y(), tp.get_z()];

    const shinGP = shin.getGlobalPose().get_p();
    const webShin = [shinGP.get_x(), shinGP.get_y(), shinGP.get_z()];

    const footGP = foot.getGlobalPose().get_p();
    const webFoot = [footGP.get_x(), footGP.get_y(), footGP.get_z()];

    const thighErr = dist(webThigh, isaacThighPos);
    const shinErr = dist(webShin, isaacShinPos);
    const footErr = dist(webFoot, isaacFootPos);
    const maxErr = Math.max(thighErr, shinErr, footErr);

    const cls = maxErr < 0.02 ? 'pass' : (maxErr < 0.1 ? 'warn' : 'fail');
    L('  thigh: web=[' + webThigh.map(v=>v.toFixed(4)).join(',') + '] isaac=[' + isaacThighPos.map(v=>v.toFixed(4)).join(',') + '] err=' + thighErr.toFixed(4), thighErr < 0.02 ? 'pass' : 'fail');
    L('  shin:  web=[' + webShin.map(v=>v.toFixed(4)).join(',') + '] isaac=[' + isaacShinPos.map(v=>v.toFixed(4)).join(',') + '] err=' + shinErr.toFixed(4), shinErr < 0.02 ? 'pass' : 'fail');
    L('  foot:  web=[' + webFoot.map(v=>v.toFixed(4)).join(',') + '] isaac=[' + isaacFootPos.map(v=>v.toFixed(4)).join(',') + '] err=' + footErr.toFixed(4), footErr < 0.02 ? 'pass' : 'fail');
    L('  max_err=' + maxErr.toFixed(4) + (maxErr < 0.02 ? ' ✓ MATCH' : ' ✗'), cls);

    if (maxErr < bestErr) {
        bestErr = maxErr;
        bestPerm = permName;
    }

    scene.removeArticulation(artic);
}

L('\n=== BEST: ' + bestPerm + ' (max_err=' + bestErr.toFixed(4) + ') ===', bestErr < 0.02 ? 'pass' : 'fail');

// Also test with NO localRot on the revolute joints (identity frame, axis via setMotion)
L('\n=== Testing with identity localRot + direct axis motion ===');
for (const perm of permutations) {
    const permName = perm.map(i => axes[i].name).join('→') + ' (identity-lr)';

    const artic = physics.createArticulationReducedCoordinate();
    artic.setSolverIterationCounts(4, 0);
    const pelvis = artic.createLink(null, new PhysX.PxTransform(
        new PhysX.PxVec3(0, 0, 0.903), new PhysX.PxQuat(0,0,0,1)));
    pelvis.attachShape(physics.createShape(new PhysX.PxSphereGeometry(0.09), material, true, shapeFlags));
    PhysX.PxRigidBodyExt.prototype.setMassAndUpdateInertia(pelvis, 10);

    const hipOff = [0, -0.084887, 0];
    let parentLink = pelvis;
    const hingeJoints = [];
    const hingeLinks = [];

    // Map axis name to PhysX enum: X→TWIST, Y→SWING1, Z→SWING2
    const axisToEnum = { 'X': E_TWIST, 'Y': E_SWING1, 'Z': E_SWING2 };

    for (let si = 0; si < 3; si++) {
        const ai = perm[si];
        const ax = axes[ai];
        const isLast = (si === 2);

        const link = artic.createLink(parentLink, new PhysX.PxTransform(
            new PhysX.PxVec3(hipOff[0], hipOff[1], 0.903 + hipOff[2]),
            new PhysX.PxQuat(0,0,0,1)));
        link.attachShape(physics.createShape(new PhysX.PxSphereGeometry(isLast ? 0.055 : 0.001), material, true, shapeFlags));
        PhysX.PxRigidBodyExt.prototype.setMassAndUpdateInertia(link, isLast ? 5 : 0.001);

        const joint = link.getInboundJoint();
        // Use SPHERICAL with only one axis enabled (identity localRot)
        joint.setJointType(E_SPHERICAL);

        const parentOff = (si === 0) ? hipOff : [0, 0, 0];
        joint.setParentPose(new PhysX.PxTransform(
            new PhysX.PxVec3(parentOff[0], parentOff[1], parentOff[2]),
            new PhysX.PxQuat(0, 0, 0, 1))); // identity
        joint.setChildPose(new PhysX.PxTransform(
            new PhysX.PxVec3(0, 0, 0),
            new PhysX.PxQuat(0, 0, 0, 1))); // identity

        const axEnum = axisToEnum[ax.name];
        joint.setMotion(axEnum, E_LIMITED);
        joint.setLimitParams(axEnum, new PhysX.PxArticulationLimit(-3.14, 3.14));
        // Lock others
        if (axEnum !== E_TWIST) joint.setMotion(E_TWIST, E_LOCKED);
        if (axEnum !== E_SWING1) joint.setMotion(E_SWING1, E_LOCKED);
        if (axEnum !== E_SWING2) joint.setMotion(E_SWING2, E_LOCKED);

        hingeJoints.push({ joint, dofValue: ax.dof, axisEnum: axEnum, axisName: ax.name });
        hingeLinks.push(link);
        parentLink = link;
    }

    const thighLink = hingeLinks[2];

    // Shin + knee
    const shin = artic.createLink(thighLink, new PhysX.PxTransform(
        new PhysX.PxVec3(hipOff[0], hipOff[1], 0.903 - 0.421546), new PhysX.PxQuat(0,0,0,1)));
    shin.attachShape(physics.createShape(new PhysX.PxCapsuleGeometry(0.05, 0.2), material, true, shapeFlags));
    PhysX.PxRigidBodyExt.prototype.setMassAndUpdateInertia(shin, 3);
    const kneeJoint = shin.getInboundJoint();
    kneeJoint.setJointType(E_REVOLUTE);
    kneeJoint.setParentPose(new PhysX.PxTransform(
        new PhysX.PxVec3(0, 0, -0.421546),
        new PhysX.PxQuat(kneeLR[1], kneeLR[2], kneeLR[3], kneeLR[0])));
    kneeJoint.setChildPose(new PhysX.PxTransform(
        new PhysX.PxVec3(0, 0, 0),
        new PhysX.PxQuat(kneeLR[1], kneeLR[2], kneeLR[3], kneeLR[0])));
    kneeJoint.setMotion(E_TWIST, E_LIMITED);
    kneeJoint.setMotion(E_SWING1, E_LOCKED);
    kneeJoint.setMotion(E_SWING2, E_LOCKED);

    // Foot
    const foot = artic.createLink(shin, new PhysX.PxTransform(
        new PhysX.PxVec3(hipOff[0], hipOff[1], 0.903 - 0.421546 - 0.40987), new PhysX.PxQuat(0,0,0,1)));
    foot.attachShape(physics.createShape(new PhysX.PxBoxGeometry(0.09, 0.045, 0.03), material, true, shapeFlags));
    PhysX.PxRigidBodyExt.prototype.setMassAndUpdateInertia(foot, 1);
    const ankleJoint = foot.getInboundJoint();
    ankleJoint.setJointType(E_FIX);
    ankleJoint.setParentPose(new PhysX.PxTransform(
        new PhysX.PxVec3(0, 0, -0.40987), new PhysX.PxQuat(0,0,0,1)));
    ankleJoint.setChildPose(new PhysX.PxTransform(
        new PhysX.PxVec3(0, 0, 0), new PhysX.PxQuat(0,0,0,1)));

    scene.addArticulation(artic);

    // Set state
    artic.setRootGlobalPose(new PhysX.PxTransform(
        new PhysX.PxVec3(traceRoot.pos[0], traceRoot.pos[1], traceRoot.pos[2]),
        new PhysX.PxQuat(traceRoot.rot[0], traceRoot.rot[1], traceRoot.rot[2], traceRoot.rot[3])), true);
    for (const hj of hingeJoints) {
        hj.joint.setJointPosition(hj.axisEnum, hj.dofValue);
    }
    kneeJoint.setJointPosition(E_TWIST, traceKnee);

    const flags = new PhysX.PxArticulationCacheFlags(PhysX.PxArticulationCacheFlagEnum.eALL);
    const cache = artic.createCache();
    artic.copyInternalStateToCache(cache, flags);
    artic.applyCache(cache, flags, true);

    const tp = thighLink.getGlobalPose().get_p();
    const webThigh = [tp.get_x(), tp.get_y(), tp.get_z()];
    const sp = shin.getGlobalPose().get_p();
    const webShin = [sp.get_x(), sp.get_y(), sp.get_z()];
    const fp = foot.getGlobalPose().get_p();
    const webFoot = [fp.get_x(), fp.get_y(), fp.get_z()];

    const thighErr = dist(webThigh, isaacThighPos);
    const shinErr = dist(webShin, isaacShinPos);
    const footErr = dist(webFoot, isaacFootPos);
    const maxErr = Math.max(thighErr, shinErr, footErr);

    const cls = maxErr < 0.02 ? 'pass' : (maxErr < 0.1 ? 'warn' : 'fail');
    L(permName + ': thigh=' + thighErr.toFixed(4) + ' shin=' + shinErr.toFixed(4) + ' foot=' + footErr.toFixed(4) + ' max=' + maxErr.toFixed(4) + (maxErr < 0.02 ? ' ✓' : ''), cls);

    if (maxErr < bestErr) {
        bestErr = maxErr;
        bestPerm = permName;
    }

    scene.removeArticulation(artic);
}

L('\n=== OVERALL BEST: ' + bestPerm + ' (max_err=' + bestErr.toFixed(4) + ') ===', bestErr < 0.02 ? 'pass' : 'fail');
L('\n=== DONE ===');
</script>
</body>
</html>
