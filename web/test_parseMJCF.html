<!DOCTYPE html>
<html><head><title>Test parseMJCF</title>
<style>body{font-family:monospace;background:#1a1a2e;color:#e0e0e0;padding:20px}
pre{background:#0d0d1a;padding:10px;border-radius:4px;overflow-x:auto}
.pass{color:#4caf50}.fail{color:#ff5252}</style></head>
<body><h1>parseMJCF Validation</h1>
<pre id="log">Loading...</pre>
<script src="parseMJCF.js"></script>
<script>
const log = document.getElementById('log');
function L(msg, cls) { const s = document.createElement('span'); s.className = cls||''; s.textContent = msg+'\n'; log.appendChild(s); }

(async () => {
    log.textContent = '';

    // Load the MJCF XML
    const xmlResp = await fetch('./humanoid_sword_shield.xml');
    const xmlText = await xmlResp.text();
    L('Loaded MJCF XML (' + xmlText.length + ' chars)');

    // Parse with JS
    const js = parseMJCF(xmlText);
    L('JS parsed: ' + js.bodies.length + ' bodies, ' + js.joints.length + ' joints, ' + js.dofInfo.length + ' DOFs');

    // Load Python reference
    const pyResp = await fetch('./humanoid_data.json');
    const py = await pyResp.json();
    L('Python ref: ' + py.bodies.length + ' bodies, ' + py.joints.length + ' joints, ' + py.dofInfo.length + ' DOFs');

    let pass = 0, fail = 0;
    function check(label, jsVal, pyVal, tol) {
        tol = tol || 0;
        const match = tol > 0 ? Math.abs(jsVal - pyVal) <= tol : jsVal === pyVal;
        if (match) { pass++; }
        else { fail++; L('  FAIL ' + label + ': JS=' + JSON.stringify(jsVal) + ' PY=' + JSON.stringify(pyVal), 'fail'); }
    }

    // Compare bodies
    L('\n=== Bodies ===');
    check('body count', js.bodies.length, py.bodies.length);
    for (let i = 0; i < Math.min(js.bodies.length, py.bodies.length); i++) {
        check('body['+i+'].name', js.bodies[i].name, py.bodies[i].name);
        check('body['+i+'].parent', js.bodies[i].parent, py.bodies[i].parent);
        for (let k = 0; k < 3; k++)
            check('body['+i+'].pos['+k+']', js.bodies[i].pos[k], py.bodies[i].pos[k], 1e-4);
    }
    L('Bodies: ' + pass + ' pass, ' + fail + ' fail', fail ? 'fail' : 'pass');

    // Compare joints
    const p0 = pass, f0 = fail;
    L('\n=== Joints ===');
    check('joint count', js.joints.length, py.joints.length);
    for (let i = 0; i < Math.min(js.joints.length, py.joints.length); i++) {
        const jj = js.joints[i], pj = py.joints[i];
        check('joint['+i+'].name', jj.name, pj.name);
        check('joint['+i+'].jointType', jj.jointType, pj.jointType);
        check('joint['+i+'].child_body', jj.child_body, pj.child_body);
        for (let k = 0; k < 4; k++)
            check('joint['+i+'].localRot['+k+']', jj.localRot[k], pj.localRot[k], 1e-4);
        for (let k = 0; k < 3; k++)
            check('joint['+i+'].localPos0['+k+']', jj.localPos0[k], pj.localPos0[k], 1e-4);
    }
    L('Joints: ' + (pass-p0) + ' pass, ' + (fail-f0) + ' fail', (fail-f0) ? 'fail' : 'pass');

    // Compare dofInfo
    const p1 = pass, f1 = fail;
    L('\n=== dofInfo ===');
    check('dofInfo count', js.dofInfo.length, py.dofInfo.length);
    for (let i = 0; i < Math.min(js.dofInfo.length, py.dofInfo.length); i++) {
        const jd = js.dofInfo[i], pd = py.dofInfo[i];
        check('dof['+i+'].axis_name', jd.axis_name, pd.axis_name);
        check('dof['+i+'].joint_name', jd.joint_name, pd.joint_name);
        check('dof['+i+'].physx_axis', jd.physx_axis, pd.physx_axis);
        check('dof['+i+'].child_body', jd.child_body, pd.child_body);
    }
    L('dofInfo: ' + (pass-p1) + ' pass, ' + (fail-f1) + ' fail', (fail-f1) ? 'fail' : 'pass');

    // Compare FK
    const p2 = pass, f2 = fail;
    L('\n=== FK data ===');
    check('fk_parent_indices count', js.fk_parent_indices.length, py.fk_parent_indices.length);
    for (let i = 0; i < Math.min(js.fk_parent_indices.length, py.fk_parent_indices.length); i++)
        check('fk_parent['+i+']', js.fk_parent_indices[i], py.fk_parent_indices[i]);
    for (let i = 0; i < Math.min(js.fk_local_translations.length, py.fk_local_translations.length); i++)
        for (let k = 0; k < 3; k++)
            check('fk_trans['+i+']['+k+']', js.fk_local_translations[i][k], py.fk_local_translations[i][k], 1e-4);
    L('FK: ' + (pass-p2) + ' pass, ' + (fail-f2) + ' fail', (fail-f2) ? 'fail' : 'pass');

    // Compare kinematicJoints
    const p3 = pass, f3 = fail;
    L('\n=== kinematicJoints ===');
    check('kinJoint count', js.kinematicJoints.length, py.kinematicJoints.length);
    for (let i = 0; i < Math.min(js.kinematicJoints.length, py.kinematicJoints.length); i++) {
        const jk = js.kinematicJoints[i], pk = py.kinematicJoints[i];
        check('kj['+i+'].type', jk.type, pk.type);
        check('kj['+i+'].dof_idx', jk.dof_idx, pk.dof_idx);
        check('kj['+i+'].dof_dim', jk.dof_dim, pk.dof_dim);
    }
    L('kinematicJoints: ' + (pass-p3) + ' pass, ' + (fail-f3) + ' fail', (fail-f3) ? 'fail' : 'pass');

    // Compare mass/inertia/com
    const p4 = pass, f4 = fail;
    L('\n=== Mass/Inertia/COM ===');
    for (let i = 0; i < Math.min(js.bodies.length, py.bodies.length); i++) {
        const jb = js.bodies[i], pb = py.bodies[i];
        if (pb.mass !== undefined) {
            check('body['+i+'].mass ('+jb.name+')', jb.mass, pb.mass, pb.mass * 0.05); // 5% tolerance
            if (pb.com) for (let k = 0; k < 3; k++)
                check('body['+i+'].com['+k+']', jb.com[k], pb.com[k], 0.01);
            if (pb.inertia) for (let k = 0; k < 3; k++)
                check('body['+i+'].inertia['+k+']', jb.inertia[k], pb.inertia[k], pb.inertia[k] * 0.1);
        }
    }
    L('Mass/Inertia: ' + (pass-p4) + ' pass, ' + (fail-f4) + ' fail', (fail-f4) ? 'fail' : 'pass');

    L('\n=== TOTAL: ' + pass + ' pass, ' + fail + ' fail ===', fail ? 'fail' : 'pass');
})();
</script></body></html>
