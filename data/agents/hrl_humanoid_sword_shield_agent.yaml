agent_name: "HRL"

# LLC config (frozen ASE agent)
llc_config: "data/agents/ase_humanoid_agent.yaml"
llc_checkpoint: "data/models/ase_humanoid_sword_shield_model.pt"
llc_steps: 5  # LLC steps per HLC decision

# HLC model (small MLP: obs+task → latent)
model:
  actor_net: "fc_2layers_1024units"
  actor_init_output_scale: 0.01
  actor_std_type: "FIXED"
  action_std: 0.1

  critic_net: "fc_2layers_1024units"

# HLC optimizer
actor_optimizer:
    type: "SGD"
    learning_rate: 2e-5

critic_optimizer:
    type: "SGD"
    learning_rate: 1e-4

# PPO params
discount: 0.99
steps_per_iter: 32
iters_per_output: 200
test_episodes: 32
normalizer_samples: 100000000

actor_epochs: 5
actor_batch_size: 4
critic_epochs: 2
critic_batch_size: 2

td_lambda: 0.95
ppo_clip_ratio: 0.2
norm_adv_clip: 4.0
action_bound_weight: 10.0
action_entropy_weight: 0.0
action_reg_weight: 0.0

# Latent dim (must match LLC)
latent_dim: 64

# Reward weights
task_reward_weight: 0.9
disc_reward_weight: 0.1
