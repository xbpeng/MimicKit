agent_name: "SMP"

model:
  actor_net: "fc_2layers_1024units"
  actor_init_output_scale: 0.01
  actor_std_type: "FIXED"
  action_std: 0.05
  
  critic_net: "fc_2layers_1024units"

actor_optimizer:
    type: "SGD"
    learning_rate: 1e-4
    use_amp: false
    amp_type: "bf16"

critic_optimizer:
    type: "SGD"
    learning_rate: 1e-4
    use_amp: false
    amp_type: "bf16"

discount: 0.99
steps_per_iter: 32
iters_per_output: 100
test_episodes: 32
normalizer_samples: 100000000

actor_epochs: 5
actor_batch_size: 4
critic_epochs: 2
critic_batch_size: 2

td_lambda: 0.95
ppo_clip_ratio: 0.2
norm_adv_clip: 4.0
action_bound_weight: 10.0
action_entropy_weight: 0.0
action_reg_weight: 0.0
critic_loss_weight: 1.0

smp_eval_batch_size: 4096
sds_loss_scale: 6
diffusion_steps: [22, 15, 8]

enable_gsi: False

task_reward_weight: 0.0
smp_reward_weight: 1.0

smp_prior_cfg: "tools/diffusion_model/config/tinymdm_single_clip.yaml"
smp_prior_model: "data/models/smp_priors/smp_prior_spinkick.pt"
